<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSEEP Planner · 彰化縣地震 TTX 示範版</title>
<!-- SheetJS powers in-browser Excel/CSV import & export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4EFE2;
    --bg-2: #EDE6D2;
    --surface: #FBF8F0;
    --ink: #1A2238;
    --ink-2: #3A4256;
    --muted: #6B6358;
    --line: #D4CDB8;
    --line-soft: #E4DCC6;
    --accent: #B8541E;
    --accent-soft: #E8C5A8;
    --locked: #A8A294;
    --success: #3D6B5A;
    --warn: #8A6D2E;
    --shadow: 0 1px 0 rgba(26,34,56,0.04), 0 8px 24px -12px rgba(26,34,56,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(26,34,56,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 280px 1fr 340px;
    min-height: 100vh;
  }

  /* ---------- HEADER STRIP ---------- */
  .topstrip {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
  }
  .brand {
    display: flex; align-items: baseline; gap: 14px;
  }
  .brand-mark {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .brand-mark::before {
    content: '◈';
    color: var(--accent);
    margin-right: 8px;
    font-size: 18px;
  }
  .brand-zh {
    font-family: 'Noto Serif TC', serif;
    font-weight: 500;
    color: var(--ink-2);
    font-size: 14px;
    padding-left: 14px;
    border-left: 1px solid var(--line);
  }
  .sprint-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--surface);
  }
  .persist-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--success);
    display: flex; align-items: center; gap: 6px;
  }
  .persist-status::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }
  .persist-status.warn { color: var(--warn); }
  .persist-status.warn::before { background: var(--warn); }

  /* ---------- SIDEBAR — STAGE RAIL ---------- */
  .rail {
    border-right: 1px solid var(--line);
    background: var(--bg);
    padding: 22px 0;
    position: sticky; top: 0;
    max-height: 100vh; overflow-y: auto;
  }
  .rail-header {
    padding: 0 22px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stage-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    padding: 11px 22px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
    position: relative;
  }
  .stage-item:hover:not(.locked) { background: var(--bg-2); }
  .stage-item.active {
    background: var(--surface);
    border-left-color: var(--accent);
  }
  .stage-item.locked { cursor: not-allowed; opacity: 0.55; }
  .stage-num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--accent);
    line-height: 1.2;
  }
  .stage-item.locked .stage-num { color: var(--locked); }
  .stage-info { display: flex; flex-direction: column; gap: 2px; }
  .stage-en {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .stage-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--muted);
  }
  .stage-status-dot {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--line);
  }
  .stage-status-dot.done { background: var(--success); }
  .stage-status-dot.in-progress { background: var(--accent); }

  /* ---------- MAIN CONTENT ---------- */
  .main {
    padding: 36px 44px 80px;
    max-width: none;
    overflow-y: auto;
  }
  .stage-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stage-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .stage-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--ink-2);
    margin-bottom: 22px;
  }
  .stage-lede {
    font-size: 15px;
    color: var(--ink-2);
    max-width: 60ch;
    margin-bottom: 32px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--line-soft);
  }
  .stage-lede em {
    font-style: normal;
    background: linear-gradient(transparent 60%, var(--accent-soft) 60%);
    padding: 0 2px;
  }
  .lede-zh {
    display: inline-block;
    margin-top: 8px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* ---------- FORM ELEMENTS ---------- */
  .field-group { margin-bottom: 26px; }
  .field-label {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 8px;
  }
  .field-label-text {
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .field-label-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--muted);
  }
  .field-hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,84,30,0.1);
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  select { cursor: pointer; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  /* ---------- CHIP SELECTORS ---------- */
  .chip-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 4px;
  }
  .chip {
    padding: 7px 13px;
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.selected {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .chip-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    opacity: 0.75;
  }

  /* ---------- OBJECTIVE CARDS ---------- */
  .objectives-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px;
    margin-top: 10px;
  }
  .objectives-block.empty {
    border-style: dashed;
    background: transparent;
    text-align: center;
    padding: 28px;
    color: var(--muted);
    font-size: 13px;
  }
  .obj-card {
    border-bottom: 1px solid var(--line-soft);
    padding: 14px 0;
  }
  .obj-card:first-child { padding-top: 0; }
  .obj-card:last-child { border-bottom: none; padding-bottom: 0; }
  .obj-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .obj-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .obj-remove {
    background: none; border: none; cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 6px;
    line-height: 1;
    border-radius: 2px;
  }
  .obj-remove:hover { color: var(--accent); background: var(--bg-2); }
  .obj-text {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--line);
    padding: 4px 0 6px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    resize: none;
    min-height: 24px;
  }
  .obj-text:focus { outline: none; border-bottom-color: var(--accent); }

  /* SMART grid for IPM */
  .smart-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 12px;
  }
  .smart-cell {
    background: var(--bg);
    border: 1px solid var(--line-soft);
    border-radius: 3px;
    padding: 10px;
  }
  .smart-letter {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
  }
  .smart-name {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .smart-cell textarea {
    background: var(--surface);
    font-size: 12px;
    min-height: 60px;
    padding: 6px 8px;
  }
  .smart-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .smart-meta input { font-size: 12.5px; padding: 7px 10px; }
  .cap-select {
    font-size: 12.5px; padding: 7px 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 3px;
    color: var(--ink);
    font-family: inherit;
    cursor: pointer;
    width: 100%;
  }
  .cap-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,84,30,0.1); }
  .obj-lock-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--line-soft);
  }
  .obj-lock-row label {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .obj-lock-row input[type="checkbox"] {
    width: auto;
    accent-color: var(--success);
  }

  .add-btn {
    background: var(--ink);
    color: var(--surface);
    border: none;
    padding: 9px 16px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.15s ease;
  }
  .add-btn:hover { background: var(--accent); }
  .add-btn::before { content: '＋'; margin-right: 6px; }

  /* ---------- DERIVATION NOTICE ---------- */
  .derive-notice {
    background: linear-gradient(180deg, var(--bg-2), transparent);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    margin-bottom: 28px;
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.55;
  }
  .derive-notice strong { color: var(--ink); }

  /* ---------- PROFILE PANEL ---------- */
  .profile {
    border-left: 1px solid var(--line);
    background: var(--bg-2);
    padding: 28px 24px;
    position: sticky; top: 0;
    max-height: 100vh; overflow-y: auto;
  }
  .profile-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .profile-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .profile-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .profile-row {
    margin-bottom: 16px;
  }
  .profile-key {
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .profile-val {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.45;
  }
  .profile-val.empty {
    color: var(--locked);
    font-style: italic;
    font-weight: 400;
  }
  .profile-objectives li {
    font-size: 12.5px;
    color: var(--ink);
    padding: 7px 0;
    border-bottom: 1px dashed var(--line-soft);
    list-style: none;
    line-height: 1.45;
    display: flex; gap: 8px;
  }
  .profile-objectives li:last-child { border-bottom: none; }
  .profile-objectives .marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
    padding-top: 2px;
  }
  .profile-objectives .marker.locked { color: var(--success); }

  .progress-strip {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }
  .progress-strip-title {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .progress-dots {
    display: flex; gap: 4px;
  }
  .progress-dot {
    flex: 1; height: 6px; border-radius: 1px;
    background: var(--line);
  }
  .progress-dot.active { background: var(--accent); }
  .progress-dot.done { background: var(--success); }

  /* ---------- LOCKED STAGE PLACEHOLDER ---------- */
  .locked-stage {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .locked-stage .locked-icon {
    font-family: 'Fraunces', serif;
    font-size: 72px;
    color: var(--locked);
    margin-bottom: 16px;
    display: block;
  }
  .locked-stage h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .locked-stage p {
    max-width: 40ch;
    margin: 0 auto;
    font-size: 14px;
  }
  .locked-stage .sprint-tag {
    display: inline-block;
    margin-top: 16px;
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  /* ---------- SPRINT 2: GATE BANNER ---------- */
  .gate-banner {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    border-radius: 3px;
    padding: 18px 22px;
    margin-bottom: 28px;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .gate-banner.ok { border-left-color: var(--success); }
  .gate-icon {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    color: var(--warn);
    line-height: 1; flex-shrink: 0;
  }
  .gate-banner.ok .gate-icon { color: var(--success); }
  .gate-body { flex: 1; }
  .gate-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .gate-desc {
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .gate-jump {
    background: var(--ink); color: var(--surface);
    border: none; padding: 7px 14px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    border-radius: 3px; cursor: pointer;
    margin-top: 10px;
  }
  .gate-jump:hover { background: var(--accent); }

  /* ---------- SPRINT 2: SCENARIO MODULES (MPM) ---------- */
  .module-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 14px;
    position: relative;
  }
  .module-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .module-num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    color: var(--accent);
    line-height: 1;
  }
  .module-head-mid {
    flex: 1; margin: 0 16px;
  }
  .module-title-input {
    font-family: 'Fraunces', serif;
    font-size: 17px; font-weight: 500;
    background: transparent; border: none;
    border-bottom: 1px dashed var(--line);
    width: 100%; padding: 3px 0;
  }
  .module-title-input:focus { outline: none; border-bottom-color: var(--accent); }
  .module-time-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 12px;
  }
  .module-time-row input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 7px 10px;
  }
  .module-narrative {
    min-height: 70px;
    font-size: 13.5px;
  }
  .obj-link-row {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--line-soft);
  }
  .obj-link-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .obj-link-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .obj-link-chip {
    padding: 5px 11px;
    font-size: 11.5px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .obj-link-chip:hover { border-color: var(--accent); }
  .obj-link-chip.selected {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent);
  }
  .obj-link-chip.selected::before { content: '✓ '; }
  .obj-link-empty {
    font-size: 12px;
    color: var(--locked);
    font-style: italic;
  }

  /* ---------- SPRINT 2: MSEL INJECTS ---------- */
  .msel-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .msel-stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 12px 14px;
  }
  .msel-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }
  .msel-stat-label {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .inject-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .inject-head {
    display: grid;
    grid-template-columns: auto auto auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line-soft);
    font-size: 12.5px;
  }
  .inject-seq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .inject-time {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 4px 8px;
    font-size: 12px;
    width: 80px;
  }
  .inject-method-select {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 4px 6px;
    font-size: 11.5px;
    font-family: inherit;
    cursor: pointer;
  }
  .inject-module-select {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 4px 6px;
    font-size: 11.5px;
    font-family: inherit;
    flex: 1;
    cursor: pointer;
  }
  .inject-body {
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .inject-field { display: flex; flex-direction: column; gap: 5px; }
  .inject-field label {
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .inject-field input, .inject-field textarea {
    font-size: 13px;
    padding: 7px 10px;
  }
  .inject-field.full { grid-column: 1 / -1; }

  /* ---------- EXPORT BUTTON ---------- */
  .export-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 7px 15px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .export-btn:hover { background: #9c441680; background: #9c4416; }

  .ghost-btn {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--accent-soft);
    padding: 7px 13px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ghost-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .batch-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 14px;
  }
  .batch-row-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .modal-xlsx {
    margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line-soft);
  }
  .modal-xlsx-title { font-weight: 700; font-size: 13px; color: var(--ink); margin-bottom: 6px; }

  /* ---------- DOCUMENT CHECKLIST (FPM) ---------- */
  .doc-row {
    display: grid;
    grid-template-columns: 1fr 180px 140px auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .doc-row:last-of-type { border-bottom: none; }
  .doc-row input[type="text"] { font-size: 13.5px; }
  .doc-status-select { font-size: 12.5px; padding: 8px 10px; cursor: pointer; }
  .doc-status-pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .pill-draft  { background: #EDE6D2; color: #6B6358; }
  .pill-review { background: #F0E2C4; color: #8A6D2E; }
  .pill-final  { background: #D6E5DD; color: #3D6B5A; }

  .checkbox-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 18px;
    margin-top: 6px;
    cursor: pointer;
  }
  .checkbox-card input[type="checkbox"] {
    width: 20px; height: 20px;
    accent-color: var(--success);
    cursor: pointer;
  }
  .checkbox-card .cc-label { font-weight: 600; font-size: 14px; }
  .checkbox-card .cc-zh { font-family: 'Noto Serif TC', serif; font-size: 12px; color: var(--muted); }

  /* ---------- CONDUCT — INJECT LOG ---------- */
  .conduct-progress {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .cp-bar-track {
    height: 10px; background: var(--bg-2);
    border-radius: 999px; overflow: hidden;
    margin: 10px 0 6px;
  }
  .cp-bar-fill {
    height: 100%; background: var(--success);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .cp-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
  }
  .log-row {
    display: grid;
    grid-template-columns: auto auto 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 11px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 8px;
    background: var(--surface);
    transition: opacity 0.2s ease, background 0.2s ease;
  }
  .log-row.delivered { background: #F0F4F1; border-color: #C5D9CE; }
  .log-seq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent); font-weight: 600;
  }
  .log-time-planned {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    background: var(--bg-2); padding: 3px 7px; border-radius: 2px;
  }
  .log-msg { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-actual {
    font-family: 'JetBrains Mono', monospace;
    width: 90px; font-size: 12px; padding: 5px 8px;
    border: 1px solid var(--line); border-radius: 2px;
    background: var(--bg);
  }
  .log-check {
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--muted); cursor: pointer;
    white-space: nowrap;
  }
  .log-check input { width: 17px; height: 17px; accent-color: var(--success); cursor: pointer; }

  /* ---------- EVALUATION — EEG CARDS ---------- */
  .eeg-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 18px;
    margin-bottom: 14px;
    border-left: 4px solid var(--line);
  }
  .eeg-card[data-rating="P"]   { border-left-color: #3D6B5A; }
  .eeg-card[data-rating="M"] { border-left-color: #6E8B3D; }
  .eeg-card[data-rating="S"] { border-left-color: #8A6D2E; }
  .eeg-card[data-rating="U"]   { border-left-color: #B8541E; }
  .eeg-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; margin-bottom: 14px;
  }
  .eeg-objective { flex: 1; }
  .eeg-obj-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 4px;
  }
  .eeg-obj-text { font-size: 14.5px; font-weight: 600; color: var(--ink); line-height: 1.4; }
  .eeg-obj-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .eeg-traceback {
    font-size: 11px; color: var(--muted); margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .rating-options { display: flex; flex-direction: column; gap: 5px; min-width: 220px; }
  .rating-opt {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid var(--line);
    border-radius: 3px; cursor: pointer; font-size: 11.5px;
    transition: all 0.15s ease;
  }
  .rating-opt:hover { border-color: var(--ink); }
  .rating-opt.selected { border-width: 1px; font-weight: 600; }
  .rating-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .eeg-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 4px; }
  .eeg-fields .field-group { margin-bottom: 0; }
  .eeg-field-full { grid-column: 1 / -1; }

  .eeg-empty {
    text-align: center; padding: 50px 20px;
    color: var(--muted);
  }

  /* ---------- AAR / IP ---------- */
  .ip-table-wrap { overflow-x: auto; margin-top: 8px; }
  .ip-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .ip-item-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .ip-num {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 18px; color: var(--accent);
  }
  .ip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ip-grid .field-group { margin-bottom: 0; }
  .ip-grid .full { grid-column: 1 / -1; }
  .ip-meta-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 4px; }
  .smart-check {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; padding: 3px 8px; border-radius: 999px;
    margin-right: 5px; margin-top: 6px;
  }
  .smart-check.ok { background: #D6E5DD; color: #3D6B5A; }
  .smart-check.missing { background: #F0E2C4; color: #8A6D2E; }
  .ip-source-pill {
    font-size: 10.5px; padding: 3px 9px; border-radius: 999px;
    background: var(--bg-2); color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- PRINT / EXPORT REPORT ---------- */
  #printReport { display: none; }
  @media print {
    body * { visibility: hidden; }
    #printReport, #printReport * { visibility: visible; }
    #printReport {
      display: block !important;
      position: absolute; left: 0; top: 0; width: 100%;
      padding: 0; background: #fff; color: #000;
    }
    @page { margin: 18mm; }
  }
  #printReport {
    font-family: 'Manrope', sans-serif;
    color: #1A2238;
    line-height: 1.5;
  }
  #printReport h1 { font-family: 'Fraunces', serif; font-size: 28px; margin-bottom: 4px; }
  #printReport h2 {
    font-family: 'Fraunces', serif; font-size: 19px;
    margin: 24px 0 8px; padding-bottom: 4px;
    border-bottom: 2px solid #B8541E;
  }
  #printReport h3 { font-size: 14px; margin: 14px 0 4px; }
  #printReport table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  #printReport th, #printReport td {
    border: 1px solid #D4CDB8; padding: 6px 8px; text-align: left; vertical-align: top;
  }
  #printReport th { background: #F4EFE2; font-weight: 600; }
  #printReport .pr-meta { font-size: 12px; color: #6B6358; margin-bottom: 16px; }
  #printReport .pr-label { font-weight: 600; font-size: 12px; color: #6B6358; }
  #printReport p { font-size: 13px; margin: 4px 0; white-space: pre-wrap; }

  .back-home-btn {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 3px;
    width: 30px; height: 30px;
    font-size: 16px; color: var(--ink);
    cursor: pointer; line-height: 1;
    transition: all 0.15s ease;
    margin-right: 4px;
  }
  .back-home-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .current-ex-name {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--accent);
    padding-left: 14px;
    margin-left: 4px;
    border-left: 1px solid var(--line);
    max-width: 320px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ---------- HOME / LIBRARY ---------- */
  body.home-view .shell { grid-template-columns: 1fr; }
  .home-wrap { max-width: 1000px; margin: 0 auto; padding: 20px 8px 60px; }
  .home-header { margin-bottom: 30px; }
  .home-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }
  .home-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 42px; letter-spacing: -0.02em;
    color: var(--ink); line-height: 1.05; margin-bottom: 6px;
  }
  .home-sub { font-size: 15px; color: var(--ink-2); }
  .new-ex-row {
    display: flex; gap: 12px; margin-bottom: 34px;
    padding-bottom: 28px; border-bottom: 1px solid var(--line-soft);
  }
  .new-ex-row input { flex: 1; font-size: 14px; padding: 12px 14px; }
  .ex-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .ex-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  .ex-card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 12px;
  }
  .ex-card-name {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 19px; color: var(--ink); line-height: 1.2;
  }
  .ex-card-menu { display: flex; gap: 4px; flex-shrink: 0; }
  .ex-icon-btn {
    background: transparent; border: none; cursor: pointer;
    font-size: 14px; color: var(--muted);
    width: 26px; height: 26px; border-radius: 3px;
    transition: all 0.15s ease;
  }
  .ex-icon-btn:hover { background: var(--bg-2); color: var(--ink); }
  .ex-icon-btn.danger:hover { background: #F0DAD0; color: var(--accent); }
  .ex-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .ex-tag {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: var(--bg-2); color: var(--ink-2);
  }
  .ex-tag.muted { color: var(--locked); font-style: italic; }
  .ex-card-meta { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  .ex-progress-track {
    height: 6px; background: var(--bg-2);
    border-radius: 999px; overflow: hidden; margin-bottom: 10px;
  }
  .ex-progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; }
  .ex-card-foot {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .home-empty {
    text-align: center; padding: 70px 20px; color: var(--muted);
    border: 1px dashed var(--line); border-radius: 8px;
  }
  .home-empty-icon { font-size: 48px; color: var(--accent); margin-bottom: 14px; }
  .home-empty-title { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 6px; }
  .home-empty-sub { font-size: 14px; max-width: 44ch; margin: 0 auto; }

  /* ---------- AI DOCK ---------- */
  .ai-fab {
    position: fixed; right: 24px; bottom: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--ink); color: #fff; border: none;
    font-size: 22px; cursor: pointer; z-index: 50;
    box-shadow: 0 6px 20px -4px rgba(26,34,56,0.4);
    transition: transform 0.15s ease, background 0.15s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .ai-fab:hover { transform: scale(1.06); background: var(--accent); }
  .ai-panel {
    position: fixed; right: 24px; bottom: 24px;
    width: 400px; max-width: calc(100vw - 32px);
    height: 600px; max-height: calc(100vh - 100px);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 12px 40px -8px rgba(26,34,56,0.35);
    z-index: 51; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ai-head {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .ai-head-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .ai-head-title .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .ai-head-stage { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .ai-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
  .ai-close:hover { color: var(--ink); }
  .ai-config {
    padding: 10px 16px; border-bottom: 1px solid var(--line-soft);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    background: var(--bg);
  }
  .ai-model-select {
    font-size: 12px; padding: 6px 8px; border: 1px solid var(--line);
    border-radius: 4px; background: var(--surface); cursor: pointer; flex: 1; min-width: 130px;
  }
  .ai-upload-btn {
    font-size: 11.5px; padding: 6px 10px; border: 1px solid var(--line);
    border-radius: 4px; background: var(--surface); cursor: pointer;
    white-space: nowrap;
  }
  .ai-upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ai-files {
    padding: 6px 16px; display: flex; flex-wrap: wrap; gap: 6px;
    border-bottom: 1px solid var(--line-soft);
  }
  .ai-file-chip {
    font-size: 10.5px; padding: 3px 8px; border-radius: 999px;
    background: var(--bg-2); color: var(--ink-2);
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ai-file-chip button { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 0; }
  .ai-body {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .ai-msg { font-size: 13px; line-height: 1.5; }
  .ai-msg.user {
    align-self: flex-end; background: var(--ink); color: #fff;
    padding: 9px 13px; border-radius: 12px 12px 2px 12px; max-width: 85%;
  }
  .ai-msg.assistant {
    align-self: flex-start; background: var(--bg-2); color: var(--ink);
    padding: 9px 13px; border-radius: 12px 12px 12px 2px; max-width: 92%;
    white-space: pre-wrap;
  }
  .ai-msg.system { align-self: center; font-size: 11.5px; color: var(--muted); font-style: italic; text-align: center; }
  .ai-suggestion {
    align-self: flex-start; width: 100%;
    border: 1px solid var(--accent-soft); border-radius: 8px;
    background: var(--bg); overflow: hidden;
  }
  .ai-sugg-head {
    padding: 8px 12px; background: var(--accent-soft);
    font-size: 11px; font-weight: 700; color: #7a3a14;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .ai-sugg-field { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; }
  .ai-sugg-body { padding: 10px 12px; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; }
  .ai-sugg-actions { padding: 0 12px 10px; display: flex; gap: 8px; }
  .ai-apply-btn {
    font-size: 11.5px; padding: 5px 12px; border-radius: 4px;
    background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600;
  }
  .ai-apply-btn:hover { background: #9c4416; }
  .ai-apply-btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .ai-apply-btn.ghost:hover { color: var(--ink); border-color: var(--ink); }
  .ai-foot { padding: 12px 16px; border-top: 1px solid var(--line); background: var(--bg); }
  .ai-quick { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .ai-quick-btn {
    font-size: 11px; padding: 5px 10px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--surface); cursor: pointer; color: var(--ink-2);
  }
  .ai-quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input {
    flex: 1; resize: none; min-height: 38px; max-height: 120px;
    font-size: 13px; padding: 9px 12px; border: 1px solid var(--line);
    border-radius: 6px; font-family: inherit;
  }
  .ai-send {
    background: var(--ink); color: #fff; border: none; border-radius: 6px;
    padding: 0 16px; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .ai-send:hover { background: var(--accent); }
  .ai-send:disabled { opacity: 0.5; cursor: default; }
  .ai-typing { font-size: 12px; color: var(--muted); font-style: italic; align-self: flex-start; }

  .ai-gear {
    background: none; border: none; font-size: 16px; cursor: pointer;
    color: var(--muted); line-height: 1; padding: 2px 4px;
  }
  .ai-gear:hover { color: var(--accent); }
  .ai-settings-body {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .ai-key-note {
    font-size: 11.5px; line-height: 1.5; color: var(--ink-2);
    background: var(--bg-2); border-radius: 6px; padding: 10px 12px;
  }
  .ai-key-row { display: flex; flex-direction: column; gap: 6px; }
  .ai-key-label {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    display: flex; justify-content: space-between; align-items: baseline;
  }

  if (!THEMES.includes(name)) name = 'warm';
  document.documentElement.setAttribute('data-theme', name);
  localStorage.setItem(THEME_KEY, name);
  // update swatch active states
  document.querySelectorAll('[data-theme-pick]').forEach(el => {
    el.classList.toggle('ts-active', el.dataset.themePick === name);
  });
}

  });
}

// ---- Exercise metadata (shown on the home picker) ----
function defaultMeta(name) {
  return {
    id: uid() + uid(),
    name: name || 'Untitled exercise',
    created: Date.now(),
    updated: Date.now(),
  };
}

// ---- Library: { exercises: [{meta, data}], currentId, ui } ----
const STORAGE_KEY = 'hseep-planner-library';
let library = { exercises: [], currentId: null };
let view = 'home'; // 'home' | 'exercise'

// Active-exercise convenience handle. All stage render code uses `state`.
let state = defaultState();

function currentExercise() {
  return library.exercises.find(e => e.meta.id === library.currentId) || null;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.exercises)) {
        library = parsed;
        // normalize each exercise's data against the current schema
        library.exercises.forEach(e => {
          e.data = Object.assign(defaultState(), e.data);
          // migrate legacy single missionArea -> missionAreas array
          if (e.data.co && typeof e.data.co.missionArea === 'string' && e.data.co.missionArea) {
            if (!Array.isArray(e.data.co.missionAreas) || !e.data.co.missionAreas.length) {
              e.data.co.missionAreas = [e.data.co.missionArea];
            }
            delete e.data.co.missionArea;
          }
          if (!Array.isArray(e.data.co.missionAreas)) e.data.co.missionAreas = [];
          // ensure discussion-exercise fields exist on older saves
          if (e.data.mselMtg) {
            if (!Array.isArray(e.data.mselMtg.discussionQuestions)) e.data.mselMtg.discussionQuestions = [];
            if (typeof e.data.mselMtg.scenarioNarrative !== 'string') e.data.mselMtg.scenarioNarrative = '';
            if (!Array.isArray(e.data.mselMtg.injects)) e.data.mselMtg.injects = [];
          }
        });
        setPersistStatus('Loaded · 已載入', false);
      }
    }
  } catch (e) {
    setPersistStatus('Memory only · 僅暫存', true);
  }
}

let saveTimer;
function saveState() {
  // sync the active handle back into the library before persisting
  const ex = currentExercise();
  if (ex) { ex.data = state; ex.meta.updated = Date.now(); }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(library));
      setPersistStatus('Saved · 已儲存', false);
    } catch (e) {
      setPersistStatus('Memory only · 僅暫存', true);
    }
  }, 250);
}

function openExercise(id) {
  const ex = library.exercises.find(e => e.meta.id === id);
  if (!ex) return;
  library.currentId = id;
  state = ex.data;
  view = 'exercise';
  saveState();
  render();
}

function createExercise(name) {
  const ex = { meta: defaultMeta(name), data: defaultState() };
  library.exercises.push(ex);
  library.currentId = ex.meta.id;
  state = ex.data;
  view = 'exercise';
  saveState();
  render();
}

function deleteExercise(id) {
  library.exercises = library.exercises.filter(e => e.meta.id !== id);
  if (library.currentId === id) { library.currentId = null; view = 'home'; }
  saveState();
  render();
}

function duplicateExercise(id) {
  const ex = library.exercises.find(e => e.meta.id === id);
  if (!ex) return;
  const copy = { meta: defaultMeta(ex.meta.name + ' (copy)'), data: JSON.parse(JSON.stringify(ex.data)) };
  library.exercises.push(copy);
  saveState();
  render();
}

function goHome() {
  view = 'home';
  render();
}

function setPersistStatus(msg, warn) {
  const el = document.getElementById('persistStatus');
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('warn', !!warn);
}

// ---- Render: Stage rail ----
function renderRail() {
  const rail = document.getElementById('stageRail');
  const header = '<div class="rail-header">Workflow · 流程</div>';
  const items = STAGES.map(s => {
    const locked = !s.active ? 'locked' : '';
    const active = s.n === state.currentStage ? 'active' : '';
    const status = stageStatus(s);
    return `
      <div class="stage-item ${locked} ${active}" data-stage="${s.n}">
        <div class="stage-num">${String(s.n).padStart(2,'0')}</div>
        <div class="stage-info">
          <span class="stage-en">${s.en}</span>
          <span class="stage-zh">${s.zh}</span>
        </div>
        <span class="stage-status-dot ${status}"></span>
      </div>
    `;
  }).join('');
  rail.innerHTML = header + items;
  rail.querySelectorAll('.stage-item').forEach(el => {
    el.addEventListener('click', () => {
      const n = parseInt(el.dataset.stage, 10);
      const stage = STAGES.find(s => s.n === n);
      if (!stage.active) return;
      state.currentStage = n;
      saveState();
      render();
    });
  });
}

function stageStatus(s) {
  if (s.n === 1) {
    const i = state.ippw;
    if (i.threats || i.hazards || i.priorities || i.candidateTypes.length) return 'in-progress';
  }
  if (s.n === 2) {
    if (state.co.exerciseType && (state.co.missionAreas||[]).length && state.co.draftObjectives.length) return 'done';
    if (state.co.exerciseType || (state.co.missionAreas||[]).length || state.co.draftObjectives.length) return 'in-progress';
  }
  if (s.n === 3) {
    const objs = state.ipm.objectives;
    if (objs.length && objs.every(o => o.locked)) return 'done';
    if (objs.length) return 'in-progress';
  }
  if (s.n === 4) {
    const m = state.mpm;
    const hasContent = m.modules.length || m.scenarioSummary || m.evaluationStrategy;
    if (m.modules.length && m.evaluationStrategy && m.mselDirection) return 'done';
    if (hasContent) return 'in-progress';
  }
  if (s.n === 5) {
    if (exerciseFamily() === 'discussion') {
      const qs = state.mselMtg.discussionQuestions || [];
      const hasScenario = !!(state.mselMtg.scenarioNarrative || '').trim();
      if (qs.length >= 3 && hasScenario && qs.every(q => (q.question||'').trim())) return 'done';
      if (qs.length || hasScenario) return 'in-progress';
    } else {
      const injects = state.mselMtg.injects;
      if (injects.length >= 3 && injects.every(i => i.message && i.expectedAction)) return 'done';
      if (injects.length) return 'in-progress';
    }
  }
  if (s.n === 6) {
    const f = state.fpm;
    const docs = f.documents;
    const allFinal = docs.length && docs.every(d => d.status === 'final');
    if (allFinal && f.rehearsalDone) return 'done';
    if (docs.length || f.logistics || f.rehearsalNotes) return 'in-progress';
  }
  if (s.n === 7) {
    const c = state.conduct;
    const log = c.injectLog || {};
    const delivered = Object.values(log).filter(x => x && x.delivered).length;
    if (c.hotwash && delivered > 0) return 'done';
    if (c.actualDate || delivered > 0 || c.hotwash || c.ceFeDebrief) return 'in-progress';
  }
  if (s.n === 8) {
    const lockedObjs = state.ipm.objectives.filter(o => o.locked);
    const eegs = state.evaluation.eegs || {};
    const rated = lockedObjs.filter(o => eegs[o.id] && eegs[o.id].rating).length;
    if (lockedObjs.length && rated === lockedObjs.length) return 'done';
    if (rated > 0) return 'in-progress';
  }
  if (s.n === 9) {
    const a = state.aar;
    const items = a.ipItems || [];
    const allHaveAction = items.length && items.every(i => i.correctiveAction);
    if (a.execSummary && allHaveAction) return 'done';
    if (a.execSummary || items.length) return 'in-progress';
  }
  return '';
}

function render() {
  const shell = document.querySelector('.shell');
  const rail = document.getElementById('stageRail');
  const profile = document.getElementById('profilePanel');
  const main = document.getElementById('mainContent');
  const backBtn = document.getElementById('backHomeBtn');

  if (view === 'home' || !currentExercise()) {
    document.body.classList.add('home-view');
    rail.style.display = 'none';
    profile.style.display = 'none';
    if (backBtn) backBtn.style.display = 'none';
    if (exportBtn) exportBtn.style.display = 'none';
    const nameEl0 = document.getElementById('currentExName');
    if (nameEl0) nameEl0.textContent = '';
    main.innerHTML = renderHome();
    attachHomeHandlers();
    return;
  }

  document.body.classList.remove('home-view');
  rail.style.display = '';
  profile.style.display = '';
  if (backBtn) backBtn.style.display = '';
  if (exportBtn) exportBtn.style.display = '';
  const nameEl = document.getElementById('currentExName');
  const ex = currentExercise();
  if (nameEl) nameEl.textContent = ex ? ex.meta.name : '';

  renderRail();
  renderProfile();
  const stage = STAGES.find(s => s.n === state.currentStage);
  if (!stage.active) { main.innerHTML = renderLockedStage(stage); return; }
  if (stage.n === 1) main.innerHTML = renderIPPW();
  if (stage.n === 2) main.innerHTML = renderCO();
  if (stage.n === 3) main.innerHTML = renderIPM();
  if (stage.n === 4) main.innerHTML = renderMPM();
  if (stage.n === 5) main.innerHTML = renderMSELMtg();
  if (stage.n === 6) main.innerHTML = renderFPM();
  if (stage.n === 7) main.innerHTML = renderConduct();
  if (stage.n === 8) main.innerHTML = renderEvaluation();
  if (stage.n === 9) main.innerHTML = renderAAR();
  attachStageHandlers(stage.n);
}

function attachHomeHandlers() {
  const createBtn = document.getElementById('createExBtn');
  const nameInput = document.getElementById('newExName');
  const doCreate = () => {
    const name = (nameInput.value || '').trim() || 'Untitled exercise';
    createExercise(name);
  };
  if (createBtn) createBtn.addEventListener('click', doCreate);
  if (nameInput) nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doCreate(); });

  const tplBtn = document.getElementById('batchTemplateBtn');
  if (tplBtn) tplBtn.addEventListener('click', () => exportBatchTemplate('xlsx'));
  const tplCsvBtn = document.getElementById('batchTemplateCsvBtn');
  if (tplCsvBtn) tplCsvBtn.addEventListener('click', () => exportBatchTemplate('csv'));
  const impBtn = document.getElementById('batchImportBtn');
  if (impBtn) impBtn.addEventListener('click', triggerImportPicker);

  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-dup]') || e.target.closest('[data-del]')) return;
      openExercise(el.dataset.open);
    });
  });
  document.querySelectorAll('[data-dup]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); duplicateExercise(el.dataset.dup); });
  });
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const ex = library.exercises.find(x => x.meta.id === el.dataset.del);
      if (ex && confirm(`Delete "${ex.meta.name}"? This cannot be undone. · 確定刪除？此動作無法復原。`)) {
        deleteExercise(el.dataset.del);
      }
    });
  });
}

}

    <p class="stage-lede">This is where the exercise <em>actually gets defined</em>. Confirm the type, choose the mission area, and draft the objectives. The IPM will refine them into SMART form.<br><span class="lede-zh">演習於此階段<em>正式成形</em>。確認演習類型、選擇任務領域並草擬目標，後續初步規劃會議（IPM）會將其精煉為 SMART 目標。</span></p>

    <div class="field-group">

// ---- STAGE 3: IPM ----
function renderIPM() {

  const pendingSection = pendingDrafts.length ? `
    <div class="field-group">

        <span class="field-label-zh">引入 CO 草擬目標</span>
      </div>

      <div class="chip-grid">
        ${pendingDrafts.map(d => `
          <div class="chip" data-pull-draft="${d.id}" style="cursor:pointer; border-style: dashed;">
            + ${escapeHtml(d.text || 'Untitled draft')}
          </div>
        `).join('')}
      </div>

    <div class="objectives-block">${objCards}</div>

  return `
    <div class="stage-eyebrow">Stage 03 · 階段三</div>
    <h1 class="stage-title">Initial Planning Meeting</h1>
    <div class="stage-title-zh">初步規劃會議（IPM）</div>
    <p class="stage-lede">Take the draft objectives from CO and make them <em>SMART</em>. Lock each one when it is ready — locked objectives become the basis for the MSEL and the EEGs.<br><span class="lede-zh">將概念與目標會議草擬的目標轉化為 <em>SMART 目標</em>，完成後逐一鎖定；鎖定後的目標即成為主要境況清單（MSEL）與演習評核指引（EEG）的依據。</span></p>

    <div class="derive-notice">
      <strong>SMART = Specific, Measurable, Achievable, Relevant, Time-bound · 明確、可衡量、可達成、相關、有時限。</strong> Add the core capability and critical task each objective targets. 為每項目標加入其驗證的核心能力與關鍵任務。
    </div>

    <div class="field-row">
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Meeting date</span>
          <span class="field-label-zh">會議日期</span>
        </div>
        <input type="date" data-field="ipm.date" value="${m.date}">
      </div>
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Attendees</span>
          <span class="field-label-zh">與會者</span>
        </div>
        <input type="text" data-field="ipm.attendees" value="${escapeHtml(m.attendees)}">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">Scope locked</span>
        <span class="field-label-zh">範圍鎖定</span>
      </div>
      <div class="field-hint">The boundaries of the exercise, now fixed: where, how long, and who plays. 演習的範疇，此時已確定：地點、時長與參演單位。<em>例如：「市應變中心及兩處消防分隊；9 月 12 日演習，為時 4 小時；參演單位含消防、警察、公共衛生與醫院聯絡窗口。」</em></div>
      <textarea data-field="ipm.scope" placeholder="Geography, duration, participating organizations…">${escapeHtml(m.scope)}</textarea>
    </div>

    <div class="field-row">
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Roles assigned</span>
          <span class="field-label-zh">角色指派</span>
      </div>
        <div class="field-hint">Who runs the exercise (not the players). 負責執行演習的工作人員（非參演者）。<em>包含演習召集人、首席評核官、控制官與模擬站人員。</em></div>
        <textarea data-field="ipm.roles" placeholder="Exercise Director, Lead Evaluator, Controller(s)…">${escapeHtml(m.roles)}</textarea>
      </div>
      <div class="field-group">
        <div class="field-label">

      </div>
        <div class="field-hint">Which exercise documents will be produced and by when. 預計產出哪些演習文件，以及各自的時程。<em>例如：狀況手冊（SitMan）、演習計畫（ExPlan）、控制官／評核官手冊、主要境況清單（MSEL）及時程表。</em></div>

function capabilitySelectOptions(selected) {
  let html = `<option value="">— select core capability · 選擇核心能力 —</option>`;
  CORE_CAPABILITIES.forEach(grp => {
    html += `<optgroup label="${grp.group}">`;
    grp.items.forEach(item => {
      html += `<option value="${escapeHtml(item)}" ${selected===item?'selected':''}>${escapeHtml(item)}</option>`;
    });
    html += `</optgroup>`;
  });
  // if a custom/legacy value exists that isn't in the list, keep it selectable
  const allItems = CORE_CAPABILITIES.flatMap(g => g.items);
  if (selected && !allItems.includes(selected)) {
    html += `<optgroup label="Custom · 自訂"><option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)}</option></optgroup>`;
  }
  return html;
}

function renderSMARTCard(o, idx) {
  const lockedClass = o.locked ? 'style="background: var(--bg); border-color: var(--success);"' : '';
  return `
    <div class="obj-card" data-ipm-obj="${o.id}" ${lockedClass}>
      <div class="obj-card-head">
        <span class="obj-tag" style="${o.locked?'color:var(--success);':''}">Objective ${String(idx+1).padStart(2,'0')} ${o.locked?'· LOCKED':''}</span>
        <button class="obj-remove" data-remove-ipm="${o.id}">×</button>
      </div>
      <div class="field-hint" style="margin-bottom:8px;">Pick the <strong>core capability</strong> this objective exercises (FEMA's 32), then name the specific critical task. e.g. capability "Operational Coordination", critical task "Activate and staff the EOC within 30 min". · 先選核心能力，再填關鍵任務。</div>
      <div class="smart-meta">
        <select class="cap-select" data-ipm-field="${o.id}.capability">${capabilitySelectOptions(o.capability||'')}</select>
        <input type="text" data-ipm-field="${o.id}.criticalTask" value="${escapeHtml(o.criticalTask||'')}"  placeholder="Critical task · 關鍵任務 (e.g. Stand up EOC in 30 min)">
      </div>
      <div class="smart-grid">
        ${['specific','measurable','achievable','relevant','timeBound'].map((k, i) => {
          const letters = ['S','M','A','R','T'];
          const names = ['Specific · 明確','Measurable · 可衡量','Achievable · 可達成','Relevant · 相關','Time-bound · 有時限'];
          const hints = [
            'Exactly what will be done? 具體要做什麼？',
            'How is success counted? (number / %) 如何計算成功？（數量／百分比）',
            'Realistic with resources on hand? 以現有資源是否可行？',
            'Ties to the capability & scenario? 是否連結核心能力與情境？',
            'By when? (e.g. within 30 min) 期限為何？（例：30分鐘內）'
          ];
          return `
            <div class="smart-cell">
              <span class="smart-letter">${letters[i]}</span>
              <div class="smart-name">${names[i]}</div>
              <textarea data-ipm-field="${o.id}.${k}" placeholder="${hints[i]}">${escapeHtml(o[k]||'')}</textarea>
            </div>
          `;
        }).join('')}
      </div>
      <div class="obj-lock-row">
        <label>
          <input type="checkbox" data-lock="${o.id}" ${o.locked?'checked':''}>
          Lock this objective · 鎖定此目標
        </label>
        <span style="font-size:11px; color:var(--muted); margin-left:auto; font-family: 'JetBrains Mono', monospace;">id: ${o.id}</span>
      </div>
    </div>
  `;
}

// ---- STAGE 4: MPM ----

  const hasLocked = lockedObjs.length > 0;

         <span class="gate-icon">◆</span>
         <div class="gate-body">

         </div>
       </div>`

         <span class="gate-icon">◇</span>
         <div class="gate-body">
           <div class="gate-title">No locked IPM objectives yet · 尚無已鎖定的 IPM 目標</div>
           <div class="gate-desc">You can still draft scenario modules here, but downstream MSEL injects need locked objectives to anchor to. Lock them at Stage 3 when ready. · 模組可先草擬，但 MSEL 需鎖定目標。</div>
           <button class="gate-jump" data-jump="3">Go to IPM · 前往 IPM</button>

    <div class="objectives-block empty">No scenario modules yet — add the first one below. · 尚無情境模組</div>
  `;

  return `
    <div class="stage-eyebrow">Stage 04 · 階段四</div>
    <h1 class="stage-title">Mid-term Planning Meeting</h1>
    <div class="stage-title-zh">中期規劃會議（MPM）</div>
    <p class="stage-lede">Take the locked objectives from IPM and <em>build the scenario around them</em>. Decompose into modules, set the evaluation strategy, and confirm the direction for the MSEL.<br><span class="lede-zh">取用 IPM 已鎖定的目標，<em>據以建構情境</em>：拆解為情境模組、訂定評核策略，並確認主要境況清單（MSEL）的發展方向。</span></p>

    ${gate}

    <div class="field-row">
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Meeting date</span>
          <span class="field-label-zh">會議日期</span>
        </div>
        <input type="date" data-field="mpm.date" value="${m.date}">
      </div>
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Attendees</span>
          <span class="field-label-zh">與會者</span>
        </div>
        <input type="text" data-field="mpm.attendees" value="${escapeHtml(m.attendees)}">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">Scenario summary (detailed)</span>
        <span class="field-label-zh">情境詳述</span>
      </div>
      <div class="field-hint">Expand the C&amp;O scenario concept into a full narrative — setting, escalation, actors. This seeds the SitMan. 將概念與目標會議的情境概念擴展為完整敘事（場景、升溫、角色），作為狀況手冊（SitMan）的基礎。
      </div>
      <textarea data-field="mpm.scenarioSummary" style="min-height: 110px;" placeholder="On Day 0 at 0630…">${escapeHtml(m.scenarioSummary)}</textarea>
    </div>

    <div class="field-group">
      <div class="field-label">

      <div class="field-hint">Each module is a scenario phase with its own time window, narrative, and the objectives it exercises. 每個模組代表一個情境階段，各自具有時間區間、情境敘事，以及所要驗證的目標。</div>
      ${moduleCards}

    <div class="field-row">
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Evaluation strategy</span>
          <span class="field-label-zh">評核策略</span>

      </div>
    </div>
  `;
}

function renderModuleCard(mod, idx, lockedObjs) {
  const linked = mod.objectiveIds || [];
  const chips = lockedObjs.length ? lockedObjs.map(o => {
    const label = (o.specific || o.capability || 'Objective').slice(0, 50);
    return `<span class="obj-link-chip ${linked.includes(o.id)?'selected':''}" data-mod-obj="${mod.id}|${o.id}" title="${escapeHtml(o.specific || '')}">${escapeHtml(label)}</span>`;
  }).join('') : '<span class="obj-link-empty">No locked objectives — return to IPM to lock some. · 無已鎖定目標</span>';

  return `
    <div class="module-card" data-mod="${mod.id}">
      <div class="module-card-head">
        <div class="module-num">M${String(idx+1).padStart(2,'0')}</div>
        <div class="module-head-mid">
          <input class="module-title-input" data-mod-field="${mod.id}.title" value="${escapeHtml(mod.title||'')}" placeholder="Module title (e.g. Initial response)">
        </div>
        <button class="obj-remove" data-remove-mod="${mod.id}">×</button>
      </div>
      <div class="module-time-row">
        <input type="text" data-mod-field="${mod.id}.timeStart" value="${escapeHtml(mod.timeStart||'')}" placeholder="Start time (e.g. D+0 0630)">
        <input type="text" data-mod-field="${mod.id}.timeEnd"   value="${escapeHtml(mod.timeEnd||'')}"   placeholder="End time (e.g. D+0 0900)">
      </div>
      <textarea class="module-narrative" data-mod-field="${mod.id}.narrative" placeholder="What unfolds during this module…">${escapeHtml(mod.narrative||'')}</textarea>
      <div class="obj-link-row">
        <span class="obj-link-label">Objectives exercised · 涵蓋目標</span>
        <div class="obj-link-chips">${chips}</div>
      </div>
    </div>
  `;
}

// ---- STAGE 5: MSEL MEETING ----
// Returns 'discussion' | 'operations' | null based on the chosen exercise type.
// Discussion-based (seminar/workshop/TTX/game) use a scenario + discussion
// questions; operations-based (drill/FE/FSE) use an MSEL with timed injects.
function exerciseFamily() {
  const t = EXERCISE_TYPES.find(t => t.id === state.co.exerciseType);
  return t ? t.family : null;
}

function renderMSELMtg() {
  // Branch by exercise family. Discussion-based exercises do not build an MSEL;
  // they use a scenario narrative plus discussion questions.
  if (exerciseFamily() === 'discussion') return renderDiscussionPlan();
  return renderMSELOperations();
}

function renderMSELOperations() {
  const ms = state.mselMtg;
  const lockedObjs = state.ipm.objectives.filter(o => o.locked);
  const modules = state.mpm.modules;
  const hasPrereqs = lockedObjs.length > 0 && modules.length > 0;

  let gate;
  if (!lockedObjs.length && !modules.length) {
    gate = `<div class="gate-banner">
      <span class="gate-icon">◇</span>
      <div class="gate-body">
        <div class="gate-title">Prerequisites missing · 前置條件未完成</div>
        <div class="gate-desc">MSEL injects anchor to <strong>locked IPM objectives</strong> and <strong>MPM scenario modules</strong>. Build those first. · 請先完成 IPM 目標與 MPM 模組。</div>
        <button class="gate-jump" data-jump="3">Go to IPM · 前往 IPM</button>
      </div>
    </div>`;
  } else if (!lockedObjs.length) {
    gate = `<div class="gate-banner">
      <span class="gate-icon">◇</span>
      <div class="gate-body">
        <div class="gate-title">No locked objectives yet · 尚無已鎖定目標</div>
        <div class="gate-desc">Injects must anchor to locked IPM objectives. Lock at least one to begin. · 請於 IPM 鎖定至少一項目標。</div>
        <button class="gate-jump" data-jump="3">Go to IPM · 前往 IPM</button>
      </div>
    </div>`;
  } else if (!modules.length) {
    gate = `<div class="gate-banner">
      <span class="gate-icon">◇</span>
      <div class="gate-body">
        <div class="gate-title">No scenario modules yet · 尚無情境模組</div>
        <div class="gate-desc">Build at least one module at MPM so injects can be placed in the scenario timeline. · 請於 MPM 建立模組。</div>
        <button class="gate-jump" data-jump="4">Go to MPM · 前往 MPM</button>
      </div>
    </div>`;
  } else {
    gate = `<div class="gate-banner ok">
      <span class="gate-icon">◆</span>
      <div class="gate-body">
        <div class="gate-title">Ready to build MSEL · 可建立 MSEL</div>
        <div class="gate-desc">${lockedObjs.length} locked objective${lockedObjs.length===1?'':'s'} · ${modules.length} scenario module${modules.length===1?'':'s'} available. · 已鎖定 ${lockedObjs.length} 目標、${modules.length} 模組。</div>
      </div>
    </div>`;
  }

  // Summary stats
  const totalInjects = ms.injects.length;
  const coveredObjs = new Set();
  ms.injects.forEach(inj => (inj.objectiveIds||[]).forEach(id => coveredObjs.add(id)));
  const objCoverage = lockedObjs.length ? `${coveredObjs.size}/${lockedObjs.length}` : '—';
  const completeInjects = ms.injects.filter(i => i.message && i.expectedAction).length;
  const moduleCount = new Set(ms.injects.map(i => i.moduleId).filter(Boolean)).size;

  const stats = `
    <div class="msel-summary">
      <div class="msel-stat"><div class="msel-stat-num">${totalInjects}</div><div class="msel-stat-label">Injects · 即時狀況</div></div>
      <div class="msel-stat"><div class="msel-stat-num">${completeInjects}</div><div class="msel-stat-label">Complete · 已完整</div></div>
      <div class="msel-stat"><div class="msel-stat-num">${objCoverage}</div><div class="msel-stat-label">Obj coverage · 目標覆蓋</div></div>
      <div class="msel-stat"><div class="msel-stat-num">${moduleCount}</div><div class="msel-stat-label">Modules used · 涵蓋模組</div></div>
    </div>
  `;

  const injectCards = ms.injects.length
    ? ms.injects.map((inj, idx) => renderInjectCard(inj, idx, modules, lockedObjs)).join('')
    : `<div class="objectives-block empty">No injects yet — add the first one below. · 尚無即時狀況</div>`;

  return `
    <div class="stage-eyebrow">Stage 05 · 階段五</div>
    <h1 class="stage-title">MSEL Meeting</h1>
    <div class="stage-title-zh">主要境況清單會議（MSEL Meeting）</div>
    <p class="stage-lede">Build the <em>Master Scenario Events List</em>. Every inject anchors to a scenario module and at least one locked objective — that's how evaluation traces back to capability.<br><span class="lede-zh">建立<em>主要境況清單（MSEL）</em>。每則即時狀況（inject）都對應一個情境模組及至少一項已鎖定目標，使評核結果得以回溯至核心能力。</span></p>

    ${gate}

    ${hasPrereqs ? stats : ''}

    <div class="field-row">
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Meeting date</span>
          <span class="field-label-zh">會議日期</span>
        </div>
        <input type="date" data-field="mselMtg.date" value="${ms.date}">
      </div>
      <div class="field-group">
        <div class="field-label">
          <span class="field-label-text">Attendees</span>
          <span class="field-label-zh">與會者</span>
        </div>
        <input type="text" data-field="mselMtg.attendees" value="${escapeHtml(ms.attendees)}">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">SimCell requirements</span>
        <span class="field-label-zh">模擬中心需求</span>
      </div>
      <div class="field-hint">The Simulation Cell (SimCell) plays everyone who isn't a real participant (absent agencies, media, the public). List what it needs. 模擬站（SimCell）負責扮演所有未實際參演的角色（如缺席機關、媒體、民眾）；請列出其所需資源。<em>例：「2條電話線；扮演中央應變中心與電視記者的人員；模擬新聞稿範本。」</em></div>
      <textarea data-field="mselMtg.simCellRequirements" placeholder="Roles to simulate, phone lines, media feed, props…">${escapeHtml(ms.simCellRequirements)}</textarea>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">Injects</span><span class="field-label-zh">即時狀況</span>
        <span class="field-label-zh">即時狀況</span>
      </div>
      ${injectCards}
      ${hasPrereqs ? '<button class="add-btn" id="addInjectBtn">Add inject · 新增即時狀況</button>' : ''}
    </div>
  `;
}

// ---- Discussion-based plan: scenario narrative + discussion questions ----
function renderDiscussionPlan() {
  const ms = state.mselMtg;
  const lockedObjs = state.ipm.objectives.filter(o => o.locked);
  const modules = state.mpm.modules;
  const questions = ms.discussionQuestions || [];
  const typeObj = EXERCISE_TYPES.find(t => t.id === state.co.exerciseType);
  const typeName = typeObj ? `${typeObj.en} · ${typeObj.zh}` : '';

  let gate;
  if (!lockedObjs.length) {
    gate = `<div class="gate-banner">
      <span class="gate-icon">◇</span>
      <div class="gate-body">
        <div class="gate-title">No locked objectives yet · 尚無已鎖定目標</div>
        <div class="gate-desc">Discussion questions anchor to locked IPM objectives. Lock at least one to begin. · 研討問題對應已鎖定的 IPM 目標，請先於 IPM 鎖定至少一項。</div>
        <button class="gate-jump" data-jump="3">Go to IPM · 前往 IPM</button>
      </div>
    </div>`;
  } else {
    gate = `<div class="gate-banner ok">
      <span class="gate-icon">◆</span>
      <div class="gate-body">
        <div class="gate-title">Ready to build the discussion guide · 可建立研討指引</div>
        <div class="gate-desc">${lockedObjs.length} locked objective${lockedObjs.length===1?'':'s'} available. This is a <strong>discussion-based</strong> exercise (${typeName}), so there is no MSEL — capture the scenario and the questions the facilitator will pose. · 此為討論型演習，無需主要境況清單；請填寫情境與促導員提問。</div>
      </div>
    </div>`;
  }

  const answeredObjs = new Set();
  questions.forEach(q => (q.objectiveIds||[]).forEach(id => answeredObjs.add(id)));
  const stats = `
    <div class="msel-summary">
      <div class="msel-stat"><div class="msel-stat-num">${questions.length}</div><div class="msel-stat-label">Questions · 研討問題</div></div>
      <div class="msel-stat"><div class="msel-stat-num">${lockedObjs.length ? answeredObjs.size+'/'+lockedObjs.length : '—'}</div><div class="msel-stat-label">Obj coverage · 目標覆蓋</div></div>
      <div class="msel-stat"><div class="msel-stat-num">${modules.length}</div><div class="msel-stat-label">Modules · 情境模組</div></div>
    </div>`;

  const qCards = questions.length
    ? questions.map((q, idx) => renderQuestionCard(q, idx, modules, lockedObjs)).join('')
    : `<div class="objectives-block empty">No discussion questions yet — add the first one below. · 尚無研討問題</div>`;

  return `
    <div class="stage-eyebrow">Stage 05 · 階段五</div>
    <h1 class="stage-title">Scenario &amp; Discussion Questions</h1>
    <div class="stage-title-zh">情境與研討問題（討論型演習）</div>
    <p class="stage-lede">This is a <em>discussion-based</em> exercise, so there is no Master Scenario Events List. Instead, write the <em>scenario narrative</em> participants will respond to, and the <em>discussion questions</em> the facilitator will pose for each objective.<br><span class="lede-zh">此為討論型演習，不建立主要境況清單（MSEL）。請改為撰寫提供給參演者的<em>情境敘事</em>，以及促導員針對各目標提出的<em>研討問題</em>。</span></p>

    ${gate}
    ${lockedObjs.length ? stats : ''}

    <div class="field-row">
      <div class="field-group">
        <div class="field-label"><span class="field-label-text">Meeting date</span><span class="field-label-zh">會議日期</span></div>
        <input type="date" data-field="mselMtg.date" value="${ms.date}">
      </div>
      <div class="field-group">
        <div class="field-label"><span class="field-label-text">Attendees</span><span class="field-label-zh">與會者</span></div>
        <input type="text" data-field="mselMtg.attendees" value="${escapeHtml(ms.attendees)}">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">Scenario narrative</span>
        <span class="field-label-zh">情境敘事</span>
      </div>
      <div class="field-hint">The situation read or presented to participants — the backdrop they discuss. For multi-phase exercises you can describe each phase here, or use the modules from MPM. 提供給參演者的情境背景；多階段演習可在此分段描述，或沿用 MPM 的情境模組。<em>例：「上午 7:30，規模 6.8 地震；30 分鐘後傳出醫院結構受損、通訊中斷。」</em></div>
      <textarea data-field="mselMtg.scenarioNarrative" style="min-height:120px;" placeholder="The scenario participants will discuss…">${escapeHtml(ms.scenarioNarrative||'')}</textarea>
    </div>

    <div class="field-group">
      <div class="field-label">
        <span class="field-label-text">Discussion questions</span>
        <span class="field-label-zh">研討問題</span>
      </div>
      <div class="field-hint">Open-ended questions the facilitator poses to draw out each objective. Tie each question to the objective(s) it explores. 促導員用以引導各目標的開放式問題；請將每題對應其探討的目標。<em>例：「依現行計畫，誰負責啟動應變中心？需多久？」</em></div>
      ${qCards}
      ${lockedObjs.length ? '<button class="add-btn" id="addQuestionBtn">Add question · 新增研討問題</button>' : ''}
    </div>
  `;
}

function renderQuestionCard(q, idx, modules, lockedObjs) {
  const linked = q.objectiveIds || [];
  const moduleOpts = modules.map((m, i) => `
    <option value="${m.id}" ${q.moduleId===m.id?'selected':''}>M${String(i+1).padStart(2,'0')} · ${escapeHtml(m.title || 'Untitled')}</option>
  `).join('');
  const objChips = lockedObjs.map(o => {
    const label = (o.specific || o.capability || 'Objective').slice(0, 40);
    return `<span class="obj-link-chip ${linked.includes(o.id)?'selected':''}" data-q-obj="${q.id}|${o.id}" title="${escapeHtml(o.specific || '')}">${escapeHtml(label)}</span>`;
  }).join('');

  return `
    <div class="inject-card" data-q="${q.id}">
      <div class="inject-head">
        <span class="inject-seq">Q${String(idx+1).padStart(2,'0')}</span>
        <select class="inject-module-select" data-q-field="${q.id}.moduleId" style="flex:1;">
          <option value="">— phase / module · 階段（選填）—</option>
          ${moduleOpts}
        </select>
        <button class="obj-remove" data-remove-q="${q.id}">×</button>
      </div>
      <textarea class="inject-msg" data-q-field="${q.id}.question" placeholder="Discussion question · 研討問題">${escapeHtml(q.question||'')}</textarea>
      <div class="inject-obj-row">
        <span class="inject-obj-label">Explores objectives · 探討目標:</span>
        ${objChips || '<span style="font-size:12px;color:var(--muted);">no locked objectives</span>'}
      </div>
    </div>
  `;
}

function renderInjectCard(inj, idx, modules, lockedObjs) {
  const linked = inj.objectiveIds || [];
  const moduleOpts = modules.map((m, i) => `
    <option value="${m.id}" ${inj.moduleId===m.id?'selected':''}>M${String(i+1).padStart(2,'0')} · ${escapeHtml(m.title || 'Untitled')}</option>
  `).join('');
  const methodOpts = INJECT_METHODS.map(m => `
    <option value="${m.id}" ${inj.method===m.id?'selected':''}>${m.en} · ${m.zh}</option>
  `).join('');
  const objChips = lockedObjs.map(o => {
    const label = (o.specific || o.capability || 'Objective').slice(0, 40);
    return `<span class="obj-link-chip ${linked.includes(o.id)?'selected':''}" data-inj-obj="${inj.id}|${o.id}" title="${escapeHtml(o.specific || '')}">${escapeHtml(label)}</span>`;
  }).join('');

  return `
    <div class="inject-card" data-inj="${inj.id}">
      <div class="inject-head">
        <span class="inject-seq">#${String(idx+1).padStart(3,'0')}</span>
        <input type="text" class="inject-time" data-inj-field="${inj.id}.time" value="${escapeHtml(inj.time||'')}" placeholder="D+0 0700">
        <select class="inject-method-select" data-inj-field="${inj.id}.method">
          <option value="">method…</option>
          ${methodOpts}
        </select>
        <select class="inject-module-select" data-inj-field="${inj.id}.moduleId">
          <option value="">— module · 模組 —</option>
          ${moduleOpts}
        </select>
        <button class="obj-remove" data-remove-inj="${inj.id}">×</button>
      </div>
      <div class="inject-body">
        <div class="inject-field">
          <label>From · 來源</label>
          <input type="text" data-inj-field="${inj.id}.fromActor" value="${escapeHtml(inj.fromActor||'')}" placeholder="Controller / SimCell / Reporter…">
        </div>
        <div class="inject-field">
          <label>To · 對象</label>
          <input type="text" data-inj-field="${inj.id}.toActor" value="${escapeHtml(inj.toActor||'')}" placeholder="EOC / Field IC / Player team…">
        </div>
        <div class="inject-field full">
          <label>Inject message · 即時狀況訊息</label>
          <textarea data-inj-field="${inj.id}.message" placeholder="The exact words/message delivered to the player.">${escapeHtml(inj.message||'')}</textarea>
        </div>
        <div class="inject-field full">
          <label>Expected action · 預期回應</label>
          <textarea data-inj-field="${inj.id}.expectedAction" placeholder="What the player is expected to do in response.">${escapeHtml(inj.expectedAction||'')}</textarea>
        </div>
        <div class="inject-field">
          <label>Assigned to · 指派</label>
          <input type="text" data-inj-field="${inj.id}.assignedTo" value="${escapeHtml(inj.assignedTo||'')}" placeholder="Controller name">
        </div>
        <div class="inject-field">
          <label>Objectives exercised · 涵蓋目標</label>
          <div class="obj-link-chips">${objChips || '<span class="obj-link-empty">No locked objectives</span>'}</div>
        </div>
      </div>
    </div>
  `;
}

// ---- STAGE 6: FPM ----

      <div class="doc-row" data-doc="${d.id}">
        <input type="text" data-doc-field="${d.id}.name" value="${escapeHtml(d.name||'')}" placeholder="Document name">
        <input type="text" data-doc-field="${d.id}.owner" value="${escapeHtml(d.owner||'')}" placeholder="Owner · 負責人">

        <div class="field-label"><span class="field-label-text">Attendees</span><span class="field-label-zh">與會者</span></div>

      <div class="field-hint">The practical arrangements for exercise day — confirm each is locked. 演習當日的各項實務安排，請逐項確認到位。<em>包含場地與場佈、參演者識別證與報到、無線電與電話、餐飲、停車與接駁、投影與影音設備，以及現場安全與醫療。</em></div>

      <label class="checkbox-card">
        <input type="checkbox" data-field-bool="fpm.rehearsalDone" ${f.rehearsalDone?'checked':''}>

      <textarea data-field="fpm.rehearsalNotes" style="margin-top:6px;" placeholder="Rehearsal notes, outstanding issues…">${escapeHtml(f.rehearsalNotes)}</textarea>
