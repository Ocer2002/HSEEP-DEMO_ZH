// ---- STAGE 7: CONDUCT ----
function renderConduct() {
  const c = state.conduct;
  const injects = [...state.mselMtg.injects];
  const log = c.injectLog || {};

  const gate = injects.length
    ? ''
    : `<div class="gate-banner">
        <span class="gate-icon">◇</span>
        <div class="gate-body">
          <div class="gate-title">No injects to run · 尚無可投放的即時狀況</div>
          <div class="gate-desc">The conduct log is built from the MSEL injects. Build them at Stage 5 first. · 執行紀錄由主要境況清單的即時狀況產生，請先於 MSEL 會議建立。</div>
          <button class="gate-jump" data-jump="5">Go to MSEL Meeting · 前往 MSEL</button>
        </div>
      </div>`;

  const delivered = injects.filter(i => log[i.id] && log[i.id].delivered).length;
  const pct = injects.length ? Math.round((delivered / injects.length) * 100) : 0;

  const progress = injects.length ? `
    <div class="conduct-progress">
      <div style="font-weight:600; font-size:13px;">Inject delivery · 即時狀況投放進度</div>
      <div class="cp-bar-track"><div class="cp-bar-fill" style="width:${pct}%;"></div></div>
      <div class="cp-label"><span>${delivered} of ${injects.length} delivered · 已執行</span><span>${pct}%</span></div>
    </div>
  ` : '';

  const logRows = injects.map((inj, idx) => {
    const entry = log[inj.id] || {};
    return `
      <div class="log-row ${entry.delivered?'delivered':''}" data-log="${inj.id}">
        <span class="log-seq">#${String(idx+1).padStart(3,'0')}</span>
        <span class="log-time-planned">${escapeHtml(inj.time||'—')}</span>
        <span class="log-msg" title="${escapeHtml(inj.message||'')}">${escapeHtml(inj.message || 'No message')}</span>
        <input type="text" class="log-actual" data-log-field="${inj.id}.actualTime" value="${escapeHtml(entry.actualTime||'')}" placeholder="actual">
        <label class="log-check">
          <input type="checkbox" data-log-deliver="${inj.id}" ${entry.delivered?'checked':''}>
          delivered
        </label>
      </div>
    `;
  }).join('');

  return `
    <div class="stage-eyebrow">Stage 07 · 階段七</div>
    <h1 class="stage-title">Conduct</h1>
    <div class="stage-title-zh">演習執行（Conduct）</div>
    <p class="stage-lede">Run the exercise. Deliver each inject from the MSEL, <em>log what actually happened</em>, then capture the hotwash and controller / evaluator debrief.<br><span class="lede-zh">執行演習：依主要境況清單投放每則即時狀況，<em>記錄實際發生情形</em>，再蒐集事件後即時反餽（hotwash）與控制官／評核官匯報。</span></p>

    ${gate}

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Exercise date (actual)</span><span class="field-label-zh">實際執行日期</span></div>
      <input type="date" data-field="conduct.actualDate" value="${c.actualDate}">
    </div>

    ${progress}

    ${injects.length ? `
    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Inject delivery log</span><span class="field-label-zh">即時狀況投放紀錄</span></div>
      <div class="field-hint">Tick each inject as it's delivered and note the actual time. This is the controller's live worksheet. 每則即時狀況投放後即勾選，並記錄實際投放時間；此為控制官的即時工作表。</div>
      ${logRows}
    </div>` : ''}

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Hotwash</span><span class="field-label-zh">即時檢討（熱洗）</span></div>
      <div class="field-hint">Immediate participant feedback captured right after play ends. 演習結束後立即向參演者蒐集的即時回饋（即事件後即時反餽）。
      </div>
      <textarea data-field="conduct.hotwash" style="min-height: 100px;" placeholder="What went well, what was confusing, immediate observations…">${escapeHtml(c.hotwash)}</textarea>
    </div>

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Controller / evaluator debrief</span><span class="field-label-zh">控制官／評核官匯報</span>
      </div>
      <div class="field-hint">The exercise staff's own debrief after players leave — how the delivery went, separate from the players' hotwash. 參演者離場後，由演習工作人員進行的內部匯報，與參演者的事件後即時反餽分開辦理。<em>例：「第6則即時狀況延遲10分鐘投放；一名評核官未掌握通訊中斷決策；模擬站電話超載。」</em></div>
      <textarea data-field="conduct.ceFeDebrief" placeholder="Notes from the C/E debrief — timing, realism, data capture gaps…">${escapeHtml(c.ceFeDebrief)}</textarea>
    </div>
  `;
}

// ---- STAGE 8: EVALUATION ----
function renderEvaluation() {
  const ev = state.evaluation;
  const lockedObjs = state.ipm.objectives.filter(o => o.locked);
  const eegs = ev.eegs || {};

  if (!lockedObjs.length) {
    return `
      <div class="stage-eyebrow">Stage 08 · 階段八</div>
      <h1 class="stage-title">Evaluation</h1>
      <div class="stage-title-zh">演習評核（Evaluation）</div>
      <p class="stage-lede">Evaluation cards are <em>auto-generated</em> from the objectives locked at IPM.<br><span class="lede-zh">評核卡將依 IPM 已鎖定的目標<em>自動產生</em>。</span></p>
      <div class="gate-banner">
        <span class="gate-icon">◇</span>
        <div class="gate-body">
          <div class="gate-title">No locked objectives to evaluate · 尚無可評核的目標</div>
          <div class="gate-desc">EEG cards are generated from locked IPM objectives. Lock at least one to begin evaluating. · 請於 IPM 鎖定目標。</div>
          <button class="gate-jump" data-jump="3">Go to IPM · 前往 IPM</button>
        </div>
      </div>
    `;
  }

  const rated = lockedObjs.filter(o => eegs[o.id] && eegs[o.id].rating).length;

  // Inject coverage per objective (from MSEL)
  const injectsByObj = {};
  state.mselMtg.injects.forEach(inj => (inj.objectiveIds||[]).forEach(id => {
    injectsByObj[id] = (injectsByObj[id]||0) + 1;
  }));

  const cards = lockedObjs.map((o, idx) => {
    const e = eegs[o.id] || {};
    const ratingOpts = RATINGS.map(r => `
      <div class="rating-opt ${e.rating===r.id?'selected':''}" data-rate="${o.id}|${r.id}" style="${e.rating===r.id?`border-color:${r.color}; background:${r.color}14;`:''}">
        <span class="rating-dot" style="background:${r.color};"></span>
        <span><strong>${r.id}</strong> — ${r.en}</span>
      </div>
    `).join('');
    const injCount = injectsByObj[o.id] || 0;
    return `
      <div class="eeg-card" data-rating="${e.rating||''}" data-eeg="${o.id}">
        <div class="eeg-head">
          <div class="eeg-objective">
            <div class="eeg-obj-tag">EEG · 演習評核指引 ${String(idx+1).padStart(2,'0')}</div>
            <div class="eeg-obj-text">${escapeHtml(o.specific || o.capability || 'Objective')}</div>
            <div class="eeg-obj-meta">${o.capability ? 'Capability: ' + escapeHtml(o.capability) : ''}${o.criticalTask ? ' · Task: ' + escapeHtml(o.criticalTask) : ''}</div>
            <div class="eeg-traceback">↳ traced from IPM objective ${o.id} · ${injCount} inject${injCount===1?'':'s'} exercised this</div>
          </div>
          <div class="rating-options">${ratingOpts}</div>
        </div>
        <div class="eeg-fields">
          <div class="field-group eeg-field-full">
            <div class="field-label"><span class="field-label-text">Observations</span><span class="field-label-zh">觀察紀錄</span></div>
            <textarea data-eeg-field="${o.id}.observations" placeholder="What evaluators observed against this objective…">${escapeHtml(e.observations||'')}</textarea>
          </div>
          <div class="field-group">
            <div class="field-label"><span class="field-label-text">Strengths</span><span class="field-label-zh">優點</span></div>
            <textarea data-eeg-field="${o.id}.strengths" placeholder="What worked well…">${escapeHtml(e.strengths||'')}</textarea>
          </div>
          <div class="field-group">
            <div class="field-label"><span class="field-label-text">Areas for improvement</span><span class="field-label-zh">待精進事項</span></div>
            <textarea data-eeg-field="${o.id}.areas" placeholder="Gaps to address — these seed the IP table…">${escapeHtml(e.areas||'')}</textarea>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="stage-eyebrow">Stage 08 · 階段八</div>
    <h1 class="stage-title">Evaluation</h1>
    <div class="stage-title-zh">演習評核（Evaluation）</div>
    <p class="stage-lede">One EEG card per locked objective, <em>auto-generated</em> from IPM. Rate each capability, record observations, and note areas for improvement — those flow into the AAR/IP.<br><span class="lede-zh">每項已鎖定目標對應一張演習評核指引（EEG）卡，由 IPM <em>自動產生</em>。請為各核心能力評等、記錄觀察並標註待精進領域，這些內容將流入事件後報告／精進計畫（AAR/IP）。</span></p>

    <div class="gate-banner ok">
      <span class="gate-icon">◆</span>
      <div class="gate-body">
        <div class="gate-title">${rated} of ${lockedObjs.length} objectives rated · 已評定 ${rated}／${lockedObjs.length}</div>
        <div class="gate-desc">Ratings follow the HSEEP scale: Performed (P), Performed with Minor Challenges (M), Performed with Some Challenges (S), Unable to be Performed (U). · 採 HSEEP 四級評定。</div>
      </div>
    </div>

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Overall evaluation narrative</span><span class="field-label-zh">整體評核摘要</span>
      </div>
      <div class="field-hint">A few sentences summarizing how the exercise went across all objectives — the big picture before the per-capability ratings below. 以數句話總結演習在各目標上的整體表現，先勾勒整體輪廓，再進行下方各核心能力的評等。<em>例：「協調表現良好；主要弱點為公眾警告的時效，兩項目標評為 S。」</em></div>
      <textarea data-field="evaluation.overallNarrative" placeholder="High-level summary of exercise performance…">${escapeHtml(ev.overallNarrative)}</textarea>
    </div>

    ${cards}
  `;
}

// ---- STAGE 9: AAR / IP ----
function renderAAR() {
  const a = state.aar;
  const lockedObjs = state.ipm.objectives.filter(o => o.locked);
  const eegs = state.evaluation.eegs || {};

  // Objectives that have an "areas for improvement" note but no IP item yet
  const ipSourceIds = new Set(a.ipItems.map(i => i.sourceObjectiveId).filter(Boolean));
  const candidateAreas = lockedObjs.filter(o => {
    const e = eegs[o.id];
    return e && (e.areas || (e.rating && e.rating !== 'P')) && !ipSourceIds.has(o.id);
  });

  const pendingSection = candidateAreas.length ? `
    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Pull in findings from evaluation</span><span class="field-label-zh">自演習評核引入發現</span></div>
      <div class="field-hint">Objectives rated below "Performed" or with improvement notes become improvement-plan candidates. 凡評等低於「達成」、或留有精進註記的目標，皆會成為精進計畫的候選項目。</div>
      <div class="chip-grid">
        ${candidateAreas.map(o => {
          const e = eegs[o.id] || {};
          const rTag = e.rating ? `[${e.rating}] ` : '';
          return `<div class="chip" data-pull-finding="${o.id}" style="border-style: dashed;">+ ${rTag}${escapeHtml((o.specific||o.capability||'Objective').slice(0,46))}</div>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  const ipCards = a.ipItems.length ? a.ipItems.map((it, idx) => renderIPItem(it, idx, lockedObjs)).join('')
    : `<div class="objectives-block empty">No improvement items yet. Pull findings from evaluation above, or add one directly. · 尚無精進項目</div>`;

  // Rating summary
  const ratingCounts = {};
  RATINGS.forEach(r => ratingCounts[r.id] = 0);
  lockedObjs.forEach(o => { const e = eegs[o.id]; if (e && e.rating) ratingCounts[e.rating]++; });
  const ratingSummary = lockedObjs.length ? `
    <div class="msel-summary" style="grid-template-columns: repeat(4, 1fr);">
      ${RATINGS.map(r => `
        <div class="msel-stat" style="border-left: 3px solid ${r.color};">
          <div class="msel-stat-num">${ratingCounts[r.id]}</div>
          <div class="msel-stat-label">${r.id} · ${r.en.split(' ')[0]}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="stage-eyebrow">Stage 09 · 階段九</div>
    <h1 class="stage-title">After-Action Review &amp; Improvement Plan</h1>
    <div class="stage-title-zh">事件後報告／精進計畫（AAR / IP）</div>
    <p class="stage-lede">Synthesize the evaluation into validated findings and a <em>SMART improvement plan</em>. Each item traces back to the objective and capability it came from.<br><span class="lede-zh">將評核結果彙整為已驗證的發現，並形成一份 <em>SMART 精進計畫</em>；每個項目皆可回溯至其來源目標與核心能力。</span></p>

    ${ratingSummary}

    <div class="field-row">
      <div class="field-group">
        <div class="field-label"><span class="field-label-text">After-Action Meeting date</span><span class="field-label-zh">檢討會議日期</span></div>
        <input type="date" data-field="aar.aamDate" value="${a.aamDate}">
      </div>
    </div>

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Executive summary</span><span class="field-label-zh">綜合摘要</span>
      </div>
      <textarea data-field="aar.execSummary" style="min-height: 110px;" placeholder="Synthesis of overall performance, key strengths, and the most important areas for improvement…">${escapeHtml(a.execSummary)}</textarea>
    </div>

    ${pendingSection}

    <div class="field-group">
      <div class="field-label"><span class="field-label-text">Improvement Plan (SMART)</span><span class="field-label-zh">精進計畫（SMART）</span></div>
      <div class="field-hint">Each corrective action should be specific, assigned to an owner, and have a due date. 每項改善行動都應具體明確，並指定負責人與完成期限。</div>
      ${ipCards}
      <button class="add-btn" id="addIpBtn">Add improvement item · 新增精進項目</button>
    </div>
  `;
}

function renderIPItem(it, idx, lockedObjs) {
  const sourceObj = lockedObjs.find(o => o.id === it.sourceObjectiveId);
  const statusOpts = IP_STATUSES.map(s => `<option value="${s.id}" ${it.status===s.id?'selected':''}>${s.en} · ${s.zh}</option>`).join('');
  const hasOwner = !!it.owner;
  const hasDue = !!it.dueDate;
  const hasAction = !!it.correctiveAction;
  return `
    <div class="ip-item" data-ip="${it.id}">
      <div class="ip-item-head">
        <span class="ip-num">IP-${String(idx+1).padStart(2,'0')}</span>
        <div style="display:flex; gap:8px; align-items:center;">
          ${sourceObj ? `<span class="ip-source-pill">↳ obj ${it.sourceObjectiveId}</span>` : ''}
          <button class="obj-remove" data-remove-ip="${it.id}">×</button>
        </div>
      </div>
      <div class="ip-grid">
        <div class="field-group full">
          <div class="field-label"><span class="field-label-text">Finding</span><span class="field-label-zh">發現</span></div>
          <textarea data-ip-field="${it.id}.finding" placeholder="The validated observation / gap…">${escapeHtml(it.finding||'')}</textarea>
        </div>
        <div class="field-group full">
          <div class="field-label"><span class="field-label-text">Corrective action</span><span class="field-label-zh">矯正措施</span></div>
          <textarea data-ip-field="${it.id}.correctiveAction" placeholder="The specific, measurable action to take…">${escapeHtml(it.correctiveAction||'')}</textarea>
        </div>
      </div>
      <div class="ip-meta-row">
        <div class="field-group">
          <div class="field-label"><span class="field-label-text">Capability</span><span class="field-label-zh">能力</span></div>
          <select class="cap-select" data-ip-field="${it.id}.capability">${capabilitySelectOptions(it.capability||'')}</select>
        </div>
        <div class="field-group">
          <div class="field-label"><span class="field-label-text">Owner</span><span class="field-label-zh">負責人</span></div>
          <input type="text" data-ip-field="${it.id}.owner" value="${escapeHtml(it.owner||'')}" placeholder="Responsible party">
        </div>
        <div class="field-group">
          <div class="field-label"><span class="field-label-text">Due date</span><span class="field-label-zh">期限</span></div>
          <input type="date" data-ip-field="${it.id}.dueDate" value="${it.dueDate||''}">
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-top:10px; flex-wrap:wrap;">
        <span class="smart-check ${hasAction?'ok':'missing'}">${hasAction?'✓':'○'} Specific action</span>
        <span class="smart-check ${hasOwner?'ok':'missing'}">${hasOwner?'✓':'○'} Owner</span>
        <span class="smart-check ${hasDue?'ok':'missing'}">${hasDue?'✓':'○'} Time-bound</span>
        <select class="doc-status-select" data-ip-field="${it.id}.status" style="margin-left:auto;">${statusOpts}</select>
      </div>
    </div>
  `;
}

// ---- STAGE LOCKED ----
function renderLockedStage(stage) {
  return `
    <div class="locked-stage">
      <span class="locked-icon">${String(stage.n).padStart(2,'0')}</span>
      <h2>${stage.en} · ${stage.zh}</h2>
      <p>This stage will be built when the planner reaches it. All upstream meeting records will flow in automatically.<br>此階段將在規劃進行到時開放；先前各會議的紀錄會自動帶入。</p>
      <span class="sprint-tag">SCHEDULED · SPRINT ${stage.sprint}</span>

// ---- PROFILE PANEL ----
function renderProfile() {
  const c = state.co;
  const m = state.ipm;
  const type = EXERCISE_TYPES.find(t => t.id === c.exerciseType);
  const missions = (c.missionAreas||[]).map(id => MISSION_AREAS.find(x => x.id === id)).filter(Boolean);
  const lockedCount = m.objectives.filter(o => o.locked).length;
  const totalObjs = m.objectives.length || c.draftObjectives.length;
  const evalEegs = state.evaluation.eegs || {};
  const ratedObjs = m.objectives.filter(o => o.locked && evalEegs[o.id] && evalEegs[o.id].rating).length;

  // progress map across 9 stages
  const dots = STAGES.map(s => {
    const st = stageStatus(s);
    if (st === 'done') return '<div class="progress-dot done"></div>';
    if (st === 'in-progress') return '<div class="progress-dot active"></div>';
    return '<div class="progress-dot"></div>';
  }).join('');

  const objList = m.objectives.length
    ? m.objectives.map((o, i) => `
        <li>
          <span class="marker ${o.locked?'locked':''}">${o.locked?'■':'□'} ${String(i+1).padStart(2,'0')}</span>
          <span>${escapeHtml(o.specific || o.capability || 'Unnamed objective')}</span>
        </li>
      `).join('')
    : (c.draftObjectives.length
        ? c.draftObjectives.map((d, i) => `
            <li>
              <span class="marker">~ ${String(i+1).padStart(2,'0')}</span>
              <span style="color: var(--muted); font-style: italic;">${escapeHtml(d.text || 'Untitled draft')}</span>
            </li>
          `).join('')
        : '<li style="color:var(--locked); font-style:italic; border:none;">No objectives yet · 尚無目標</li>');

  document.getElementById('profilePanel').innerHTML = `
    <div class="profile-header">Exercise Profile</div>
    <div class="profile-title">Derived view · 衍生檢視</div>
    <div class="profile-title-zh">演習摘要（自會議紀錄推導）</div>

    <div class="profile-row">
      <div class="profile-key">Exercise type · 演習類型</div>
      <div class="profile-val ${type?'':'empty'}">${type ? type.en + ' · ' + type.zh : 'set in CO Meeting →'}</div>
    </div>

    <div class="profile-row">
      <div class="profile-key">Mission areas · 任務領域</div>
      <div class="profile-val ${missions.length?'':'empty'}">${missions.length ? missions.map(x => x.en + ' · ' + x.zh).join('<br>') : 'set in CO Meeting →'}</div>
    </div>

    <div class="profile-row">
      <div class="profile-key">Scope · 範圍</div>
      <div class="profile-val ${m.scope?'':'empty'}">${m.scope ? escapeHtml(m.scope) : 'set at IPM →'}</div>
    </div>

    <div class="profile-row">
      <div class="profile-key">Objectives · 目標 (${lockedCount}/${totalObjs} locked)</div>
      <ul class="profile-objectives">${objList}</ul>
    </div>

    <div class="profile-row">
      <div class="profile-key">Scenario modules · 情境模組</div>
      <div class="profile-val ${state.mpm.modules.length?'':'empty'}">${state.mpm.modules.length ? state.mpm.modules.length + ' module' + (state.mpm.modules.length===1?'':'s') + ' · 個模組' : 'built at MPM →'}</div>
    </div>

    <div class="profile-row">
      ${exerciseFamily() === 'discussion'
        ? `<div class="profile-key">Discussion questions · 研討問題</div>
           <div class="profile-val ${(state.mselMtg.discussionQuestions||[]).length?'':'empty'}">${(state.mselMtg.discussionQuestions||[]).length ? (state.mselMtg.discussionQuestions||[]).length + ' question(s) · 題' : 'built at Stage 5 →'}</div>`
        : `<div class="profile-key">MSEL injects · 即時狀況</div>
           <div class="profile-val ${state.mselMtg.injects.length?'':'empty'}">${state.mselMtg.injects.length ? state.mselMtg.injects.length + ' inject(s) · 則即時狀況' : 'built at MSEL Meeting →'}</div>`
      }
    </div>

    <div class="profile-row">
      <div class="profile-key">Objectives rated · 已評定目標</div>
      <div class="profile-val ${ratedObjs?'':'empty'}">${lockedCount ? ratedObjs + ' / ' + lockedCount + ' rated · 已評定' : 'rated at Evaluation →'}</div>
    </div>

    <div class="profile-row">
      <div class="profile-key">Improvement items · 精進項目</div>
      <div class="profile-val ${state.aar.ipItems.length?'':'empty'}">${state.aar.ipItems.length ? state.aar.ipItems.length + ' item' + (state.aar.ipItems.length===1?'':'s') + ' · 項' : 'built at AAR/IP →'}</div>
    </div>

    <div class="progress-strip">
      <div class="progress-strip-title">Workflow progress · 流程進度</div>
      <div class="progress-dots">${dots}</div>
    </div>
  `;
}

// ---- Field-binding ----
function attachStageHandlers(stage) {
  // generic text bindings
  document.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', e => {
      const path = el.dataset.field.split('.');
      setPath(state, path, el.value);
      saveState();
      renderProfile();
      renderRail();
    });
  });

  if (stage === 1) {
    document.querySelectorAll('#ippwTypeChips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.type;
        const arr = state.ippw.candidateTypes;
        const idx = arr.indexOf(id);
        if (idx >= 0) arr.splice(idx, 1); else arr.push(id);
        saveState(); render();
      });
    });
  }

  if (stage === 2) {
    document.querySelectorAll('#coMissionChips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.mission;
        if (!Array.isArray(state.co.missionAreas)) state.co.missionAreas = [];
        const arr = state.co.missionAreas;
        const idx = arr.indexOf(id);
        if (idx >= 0) arr.splice(idx, 1); else arr.push(id);
        saveState(); render();
      });
    });
    const addBtn = document.getElementById('addDraftBtn');
    if (addBtn) addBtn.addEventListener('click', () => {
      state.co.draftObjectives.push({ id: uid(), text: '' });
      saveState(); render();
    });
    document.querySelectorAll('[data-draft-text]').forEach(el => {
      el.addEventListener('input', () => {
        const id = el.dataset.draftText;
        const o = state.co.draftObjectives.find(x => x.id === id);
        if (o) { o.text = el.value; saveState(); renderProfile(); }
      });
    });
    document.querySelectorAll('[data-remove-draft]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.removeDraft;
        state.co.draftObjectives = state.co.draftObjectives.filter(x => x.id !== id);
        // also remove any IPM objective sourced from this draft
        state.ipm.objectives = state.ipm.objectives.filter(x => x.sourceDraftId !== id);
        saveState(); render();
      });
    });
  }

  if (stage === 3) {
    document.querySelectorAll('[data-pull-draft]').forEach(el => {
      el.addEventListener('click', () => {
        const draftId = el.dataset.pullDraft;
        const draft = state.co.draftObjectives.find(d => d.id === draftId);
        if (!draft) return;
        state.ipm.objectives.push(blankIpmObjective(draft));
        saveState(); render();
      });
    });
    document.getElementById('addIpmBtn').addEventListener('click', () => {
      state.ipm.objectives.push(blankIpmObjective());
      saveState(); render();
    });
    document.querySelectorAll('[data-ipm-field]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, () => {
        const [id, field] = el.dataset.ipmField.split('.');
        const o = state.ipm.objectives.find(x => x.id === id);
        if (o) { o[field] = el.value; saveState(); renderProfile(); }
      });
    });
    document.querySelectorAll('[data-remove-ipm]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.removeIpm;
        state.ipm.objectives = state.ipm.objectives.filter(x => x.id !== id);
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-lock]').forEach(el => {
      el.addEventListener('change', () => {
        const id = el.dataset.lock;
        const o = state.ipm.objectives.find(x => x.id === id);
        if (o) {
          o.locked = el.checked;
          // If unlocked, scrub references from modules and injects
          if (!o.locked) {
            state.mpm.modules.forEach(m => {
              m.objectiveIds = (m.objectiveIds || []).filter(x => x !== id);
            });
            state.mselMtg.injects.forEach(inj => {
              inj.objectiveIds = (inj.objectiveIds || []).filter(x => x !== id);
            });
          }
          saveState(); render();
        }
      });
    });
  }

  // STAGE 4 — MPM handlers
  if (stage === 4) {
    const addBtn = document.getElementById('addModuleBtn');
    if (addBtn) addBtn.addEventListener('click', () => {
      state.mpm.modules.push(blankModule());
      saveState(); render();
    });
    document.querySelectorAll('[data-mod-field]').forEach(el => {
      el.addEventListener('input', () => {
        const [id, field] = el.dataset.modField.split('.');
        const m = state.mpm.modules.find(x => x.id === id);
        if (m) { m[field] = el.value; saveState(); renderProfile(); renderRail(); }
      });
    });
    document.querySelectorAll('[data-remove-mod]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.removeMod;
        state.mpm.modules = state.mpm.modules.filter(x => x.id !== id);
        // Scrub references in injects
        state.mselMtg.injects.forEach(inj => {
          if (inj.moduleId === id) inj.moduleId = '';
        });
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-mod-obj]').forEach(el => {
      el.addEventListener('click', () => {
        const [modId, objId] = el.dataset.modObj.split('|');
        const m = state.mpm.modules.find(x => x.id === modId);
        if (!m) return;
        m.objectiveIds = m.objectiveIds || [];
        const idx = m.objectiveIds.indexOf(objId);
        if (idx >= 0) m.objectiveIds.splice(idx, 1); else m.objectiveIds.push(objId);
        saveState(); render();
      });
    });
  }

  // STAGE 5 — MSEL Meeting handlers
  if (stage === 5) {
    const addBtn = document.getElementById('addInjectBtn');
    if (addBtn) addBtn.addEventListener('click', () => {
      state.mselMtg.injects.push(blankInject());
      saveState(); render();
    });
    document.querySelectorAll('[data-inj-field]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, () => {
        const [id, field] = el.dataset.injField.split('.');
        const inj = state.mselMtg.injects.find(x => x.id === id);
        if (inj) { inj[field] = el.value; saveState(); renderProfile(); renderRail(); }
      });
    });
    document.querySelectorAll('[data-remove-inj]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.removeInj;
        state.mselMtg.injects = state.mselMtg.injects.filter(x => x.id !== id);
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-inj-obj]').forEach(el => {
      el.addEventListener('click', () => {
        const [injId, objId] = el.dataset.injObj.split('|');
        const inj = state.mselMtg.injects.find(x => x.id === injId);
        if (!inj) return;
        inj.objectiveIds = inj.objectiveIds || [];
        const idx = inj.objectiveIds.indexOf(objId);
        if (idx >= 0) inj.objectiveIds.splice(idx, 1); else inj.objectiveIds.push(objId);
        saveState(); render();
      });
    });

    // Discussion-based questions (when exercise family === 'discussion')
    const addQ = document.getElementById('addQuestionBtn');
    if (addQ) addQ.addEventListener('click', () => {
      state.mselMtg.discussionQuestions = state.mselMtg.discussionQuestions || [];
      state.mselMtg.discussionQuestions.push({ id: uid(), moduleId: '', objectiveIds: [], question: '' });
      saveState(); render();
    });
    document.querySelectorAll('[data-q-field]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, () => {
        const [id, field] = el.dataset.qField.split('.');
        const q = (state.mselMtg.discussionQuestions||[]).find(x => x.id === id);
        if (q) { q[field] = el.value; saveState(); if (evt==='change') render(); else renderProfile(); }
      });
    });
    document.querySelectorAll('[data-remove-q]').forEach(el => {
      el.addEventListener('click', () => {
        state.mselMtg.discussionQuestions = (state.mselMtg.discussionQuestions||[]).filter(x => x.id !== el.dataset.removeQ);
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-q-obj]').forEach(el => {
      el.addEventListener('click', () => {
        const [qId, objId] = el.dataset.qObj.split('|');
        const q = (state.mselMtg.discussionQuestions||[]).find(x => x.id === qId);
        if (!q) return;
        q.objectiveIds = q.objectiveIds || [];
        const idx = q.objectiveIds.indexOf(objId);
        if (idx >= 0) q.objectiveIds.splice(idx, 1); else q.objectiveIds.push(objId);
        saveState(); render();
      });
    });
  }

  // STAGE 6 — FPM handlers
  if (stage === 6) {
    document.querySelectorAll('[data-field-bool]').forEach(el => {
      el.addEventListener('change', () => {
        const path = el.dataset.fieldBool.split('.');
        setPath(state, path, el.checked);
        saveState(); render();
      });
    });
    const addDoc = document.getElementById('addDocBtn');
    if (addDoc) addDoc.addEventListener('click', () => {
      state.fpm.documents.push({ id: uid(), name: '', owner: '', status: 'draft' });
      saveState(); render();
    });
    const seed = document.getElementById('seedDocsBtn');
    if (seed) seed.addEventListener('click', () => {
      ['Situation Manual (SitMan)','Exercise Plan (ExPlan)','Controller / Evaluator Handbook','Master Scenario Events List (MSEL)','Exercise schedule','Safety plan']
        .forEach(name => state.fpm.documents.push({ id: uid(), name, owner: '', status: 'draft' }));
      saveState(); render();
    });
    document.querySelectorAll('[data-doc-field]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, () => {
        const [id, field] = el.dataset.docField.split('.');
        const d = state.fpm.documents.find(x => x.id === id);
        if (d) { d[field] = el.value; saveState(); if (evt==='change'){render();} else {renderRail();} }
      });
    });
    document.querySelectorAll('[data-remove-doc]').forEach(el => {
      el.addEventListener('click', () => {
        state.fpm.documents = state.fpm.documents.filter(x => x.id !== el.dataset.removeDoc);
        saveState(); render();
      });
    });
  }

  // STAGE 7 — Conduct handlers
  if (stage === 7) {
    document.querySelectorAll('[data-log-deliver]').forEach(el => {
      el.addEventListener('change', () => {
        const id = el.dataset.logDeliver;
        state.conduct.injectLog[id] = state.conduct.injectLog[id] || {};
        state.conduct.injectLog[id].delivered = el.checked;
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-log-field]').forEach(el => {
      el.addEventListener('input', () => {
        const [id, field] = el.dataset.logField.split('.');
        state.conduct.injectLog[id] = state.conduct.injectLog[id] || {};
        state.conduct.injectLog[id][field] = el.value;
        saveState();
      });
    });
  }

  // STAGE 8 — Evaluation handlers
  if (stage === 8) {
    document.querySelectorAll('[data-rate]').forEach(el => {
      el.addEventListener('click', () => {
        const [objId, rating] = el.dataset.rate.split('|');
        state.evaluation.eegs[objId] = state.evaluation.eegs[objId] || {};
        // toggle off if same rating clicked
        state.evaluation.eegs[objId].rating =
          state.evaluation.eegs[objId].rating === rating ? '' : rating;
        saveState(); render();
      });
    });
    document.querySelectorAll('[data-eeg-field]').forEach(el => {
      el.addEventListener('input', () => {
        const [id, field] = el.dataset.eegField.split('.');
        state.evaluation.eegs[id] = state.evaluation.eegs[id] || {};
        state.evaluation.eegs[id][field] = el.value;
        saveState(); renderRail();
      });
    });
  }

  // STAGE 9 — AAR/IP handlers
  if (stage === 9) {
    document.querySelectorAll('[data-pull-finding]').forEach(el => {
      el.addEventListener('click', () => {
        const objId = el.dataset.pullFinding;
        const obj = state.ipm.objectives.find(o => o.id === objId);
        const e = (state.evaluation.eegs || {})[objId] || {};
        state.aar.ipItems.push({
          id: uid(),
          sourceObjectiveId: objId,
          finding: e.areas || '',
          correctiveAction: '',
          capability: obj ? obj.capability : '',
          owner: '',
          dueDate: '',
          status: 'open',
        });
        saveState(); render();
      });
    });
    const addIp = document.getElementById('addIpBtn');
    if (addIp) addIp.addEventListener('click', () => {
      state.aar.ipItems.push({ id: uid(), sourceObjectiveId: null, finding: '', correctiveAction: '', capability: '', owner: '', dueDate: '', status: 'open' });
      saveState(); render();
    });
    document.querySelectorAll('[data-ip-field]').forEach(el => {
      const evt = el.tagName === 'SELECT' ? 'change' : 'input';
      el.addEventListener(evt, () => {
        const [id, field] = el.dataset.ipField.split('.');
        const it = state.aar.ipItems.find(x => x.id === id);
        if (it) { it[field] = el.value; saveState(); if(evt==='input'){renderRail();} else {render();} }
      });
    });
    document.querySelectorAll('[data-remove-ip]').forEach(el => {
      el.addEventListener('click', () => {
        state.aar.ipItems = state.aar.ipItems.filter(x => x.id !== el.dataset.removeIp);
        saveState(); render();
      });
    });
  }

  // Global: gate-jump buttons (work from any stage)
  document.querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', () => {
      const n = parseInt(el.dataset.jump, 10);
      const target = STAGES.find(s => s.n === n);
      if (target && target.active) {
        state.currentStage = n;
        saveState(); render();
      }
    });
  });
}

function blankIpmObjective(draft) {
  return {
    id: uid(),
    sourceDraftId: draft ? draft.id : null,
    capability: '',
    criticalTask: '',
    specific: draft ? draft.text : '',
    measurable: '',
    achievable: '',
    relevant: '',
    timeBound: '',
    locked: false,
  };
}

function blankModule() {
  return {
    id: uid(),
    title: '',
    timeStart: '',
    timeEnd: '',
    narrative: '',
    objectiveIds: [],
  };
}

function blankInject() {
  return {
    id: uid(),
    time: '',
    moduleId: '',
    method: '',
    fromActor: '',
    toActor: '',
    message: '',
    expectedAction: '',
    objectiveIds: [],
    assignedTo: '',
  };
}

// ---- Utility ----
function setPath(obj, path, value) {
  let cur = obj;
  for (let i = 0; i < path.length - 1; i++) cur = cur[path[i]];
  cur[path[path.length - 1]] = value;
}
function getPath(obj, path) {
  let cur = obj;
  for (const k of path) { if (cur == null) return undefined; cur = cur[k]; }
  return cur;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ---- Export: build full printable report ----
// ---- Export sections registry ----
const EXPORT_SECTIONS = [
  { id: 'profile',  en: 'Exercise Profile',                 zh: '演習摘要' },
  { id: 'objectives', en: 'Objectives (SMART)',             zh: '目標' },
  { id: 'modules',  en: 'Scenario Modules',                 zh: '情境模組' },
  { id: 'msel',     en: 'Master Scenario Events List',      zh: '主要境況清單' },
  { id: 'conduct',  en: 'Conduct',                          zh: '演習執行' },
  { id: 'evaluation', en: 'Evaluation',                     zh: '演習評核' },
  { id: 'aar',      en: 'After-Action Report & Improvement Plan', zh: '事件後報告／精進計畫' },
];

function sectionHasContent(id) {
  const d = state;
  switch (id) {
    case 'profile': return !!(d.co.exerciseType || (d.co.missionAreas||[]).length || d.ipm.scope || d.co.scenarioConcept);
    case 'objectives': return d.ipm.objectives.some(o => o.locked);
    case 'modules': return d.mpm.modules.length > 0;
    case 'msel': return d.mselMtg.injects.length > 0 || (d.mselMtg.discussionQuestions||[]).length > 0 || !!(d.mselMtg.scenarioNarrative||'').trim();
    case 'conduct': return !!(d.conduct.actualDate || d.conduct.hotwash || Object.keys(d.conduct.injectLog||{}).length);
    case 'evaluation': return d.evaluation.overallNarrative || Object.values(d.evaluation.eegs||{}).some(e => e && e.rating);
    case 'aar': return !!(d.aar.execSummary || d.aar.ipItems.length);
    default: return false;
  }
}

function buildReport(selected) {
  selected = selected || EXPORT_SECTIONS.map(s => s.id);
  const sel = new Set(selected);
  const c = state.co, m = state.ipm, mp = state.mpm, ms = state.mselMtg;
  const f = state.fpm, cd = state.conduct, ev = state.evaluation, a = state.aar;
  const type = EXERCISE_TYPES.find(t => t.id === c.exerciseType);
  const missions = (c.missionAreas||[]).map(id => MISSION_AREAS.find(x => x.id === id)).filter(Boolean);
  const lockedObjs = m.objectives.filter(o => o.locked);
  const eegs = ev.eegs || {};
  const ratingName = id => { const r = RATINGS.find(x => x.id === id); return r ? r.id + ' — ' + r.en : '—'; };
  const p = s => s ? escapeHtml(s) : '<span style="color:#A8A294;">—</span>';
  const today = new Date().toISOString().slice(0,10);
  const exName = (currentExercise() && currentExercise().meta.name) || 'Exercise';

  let n = 0;
  let h = `<h1>${escapeHtml(exName)}</h1>
    <div class="pr-meta">HSEEP Planner · 演習規劃工作台 · Exercise Plan &amp; After-Action Report · generated ${today}</div>`;

  if (sel.has('profile')) {
    h += `<h2>${++n} · Exercise Profile · 演習摘要</h2>
      <table>
        <tr><th style="width:30%;">Exercise type · 演習類型</th><td>${type ? type.en + ' · ' + type.zh : '—'}</td></tr>
        <tr><th>Mission area(s) · 任務領域</th><td>${missions.length ? missions.map(x => x.en + ' · ' + x.zh).join('; ') : '—'}</td></tr>
        <tr><th>Scope · 範圍</th><td>${p(m.scope)}</td></tr>
        <tr><th>Scenario concept · 情境概念</th><td>${p(c.scenarioConcept)}</td></tr>
      </table>`;
  }

  if (sel.has('objectives')) {
    h += `<h2>${++n} · Objectives (SMART) · 目標</h2>`;
    if (lockedObjs.length) {
      h += `<table><tr><th>#</th><th>Objective · 目標</th><th>Capability · 核心能力</th><th>Critical task · 關鍵任務</th></tr>`;
      lockedObjs.forEach((o, i) => {
        h += `<tr><td>${i+1}</td><td>${p(o.specific)}</td><td>${p(o.capability)}</td><td>${p(o.criticalTask)}</td></tr>`;
      });
      h += `</table>`;
    } else { h += `<p>No locked objectives. 無已鎖定目標。</p>`; }
  }

  if (sel.has('modules')) {
    h += `<h2>${++n} · Scenario Modules · 情境模組</h2>`;
    if (mp.modules.length) {
      h += `<table><tr><th>#</th><th>Module · 模組</th><th>Window · 時間區間</th><th>Narrative · 敘事</th></tr>`;
      mp.modules.forEach((mod, i) => {
        h += `<tr><td>M${String(i+1).padStart(2,'0')}</td><td>${p(mod.title)}</td><td>${escapeHtml(mod.timeStart||'')} – ${escapeHtml(mod.timeEnd||'')}</td><td>${p(mod.narrative)}</td></tr>`;
      });
      h += `</table>`;
    } else { h += `<p>No modules. 無模組。</p>`; }
  }

  if (sel.has('msel')) {
    const fam = type ? type.family : null;
    if (fam === 'discussion') {
      h += `<h2>${++n} · Scenario &amp; Discussion Questions · 情境與研討問題</h2>`;
      if ((ms.scenarioNarrative||'').trim()) {
        h += `<p style="white-space:pre-wrap;">${escapeHtml(ms.scenarioNarrative)}</p>`;
      }
      const qs = ms.discussionQuestions || [];
      if (qs.length) {
        h += `<table><tr><th>#</th><th>Phase · 階段</th><th>Discussion question · 研討問題</th><th>Objectives · 目標</th></tr>`;
        qs.forEach((q, i) => {
          const mod = mp.modules.find(x => x.id === q.moduleId);
          const objNums = (q.objectiveIds||[]).map(id => {
            const oi = lockedObjs.findIndex(o => o.id === id);
            return oi >= 0 ? 'O'+String(oi+1).padStart(2,'0') : '';
          }).filter(Boolean).join(', ');
          h += `<tr><td>Q${i+1}</td><td>${mod?escapeHtml(mod.title||'—'):'—'}</td><td>${p(q.question)}</td><td>${objNums||'—'}</td></tr>`;
        });
        h += `</table>`;
      } else if (!(ms.scenarioNarrative||'').trim()) {
        h += `<p>No discussion questions. 無研討問題。</p>`;
      }
    } else {
      h += `<h2>${++n} · Master Scenario Events List · 主要境況清單</h2>`;
      if (ms.injects.length) {
        h += `<table><tr><th>#</th><th>Time · 時間</th><th>Method · 傳遞方式</th><th>Message · 訊息</th><th>Expected action · 預期行動</th></tr>`;
        ms.injects.forEach((inj, i) => {
          const meth = INJECT_METHODS.find(x => x.id === inj.method);
          h += `<tr><td>${i+1}</td><td>${escapeHtml(inj.time||'')}</td><td>${meth?meth.en:'—'}</td><td>${p(inj.message)}</td><td>${p(inj.expectedAction)}</td></tr>`;
        });
        h += `</table>`;
      } else { h += `<p>No injects. 無即時狀況。</p>`; }
    }
  }

  if (sel.has('conduct')) {
    const delivered = Object.values(cd.injectLog||{}).filter(x => x && x.delivered).length;
    h += `<h2>${++n} · Conduct · 演習執行</h2>
      <table>
        <tr><th style="width:30%;">Exercise date · 執行日期</th><td>${p(cd.actualDate)}</td></tr>
        <tr><th>Injects delivered · 已投放即時狀況</th><td>${delivered} / ${ms.injects.length}</td></tr>
        <tr><th>Hotwash · 事件後即時反餽</th><td>${p(cd.hotwash)}</td></tr>
        <tr><th>C/E debrief · 控制官／評核官匯報</th><td>${p(cd.ceFeDebrief)}</td></tr>
      </table>`;
  }

  if (sel.has('evaluation')) {
    h += `<h2>${++n} · Evaluation · 演習評核</h2>`;
    if (ev.overallNarrative) h += `<p><span class="pr-label">Overall · 整體:</span> ${p(ev.overallNarrative)}</p>`;
    if (lockedObjs.length) {
      h += `<table><tr><th>Objective · 目標</th><th>Rating · 評等</th><th>Strengths · 優勢</th><th>Areas for improvement · 待精進領域</th></tr>`;
      lockedObjs.forEach(o => {
        const e = eegs[o.id] || {};
        h += `<tr><td>${p(o.specific||o.capability)}</td><td>${e.rating?ratingName(e.rating):'—'}</td><td>${p(e.strengths)}</td><td>${p(e.areas)}</td></tr>`;
      });
      h += `</table>`;
    }
  }

  if (sel.has('aar')) {
    h += `<h2>${++n} · After-Action Report &amp; Improvement Plan · 事件後報告／精進計畫</h2>`;
    if (a.execSummary) h += `<p><span class="pr-label">Executive summary · 摘要:</span> ${p(a.execSummary)}</p>`;
    if (a.ipItems.length) {
      h += `<table><tr><th>#</th><th>Finding · 發現</th><th>Corrective action · 改善行動</th><th>Capability · 核心能力</th><th>Owner · 負責人</th><th>Due · 期限</th><th>Status · 狀態</th></tr>`;
      a.ipItems.forEach((it, i) => {
        const st = IP_STATUSES.find(x => x.id === it.status);
        h += `<tr><td>IP-${String(i+1).padStart(2,'0')}</td><td>${p(it.finding)}</td><td>${p(it.correctiveAction)}</td><td>${p(it.capability)}</td><td>${p(it.owner)}</td><td>${escapeHtml(it.dueDate||'—')}</td><td>${st?st.en:'—'}</td></tr>`;
      });
      h += `</table>`;
    } else { h += `<p>No improvement items. 無精進項目。</p>`; }
  }

// All scalar paths flattened (used for batch sheet columns)
function xlsxAllFields() {
  const out = [];
  Object.values(XLSX_SCHEMA).forEach(arr => arr.forEach(f => out.push(f)));
  return out;
}

function readField(data, path) {
  const v = getPath(data, path.split('.'));
  return v == null ? '' : v;
}

// Convert a stored value to a spreadsheet cell string
function fieldToCell(data, f) {
  const v = readField(data, f.path);
  if (f.list) return Array.isArray(v) ? v.join(', ') : '';
  if (f.bool) return v ? 'yes' : 'no';
  return String(v);
}

// Apply a spreadsheet cell string back into a data object
function cellToField(data, f, raw) {
  const val = (raw == null ? '' : String(raw)).trim();
  if (f.list) {
    const ids = val.split(/[,，;；]/).map(s => s.trim()).filter(Boolean);
    const valid = (window[f.list] || []).map(x => x.id);
    setPath(data, f.path.split('.'), ids.filter(id => valid.includes(id)));
  } else if (f.bool) {
    setPath(data, f.path.split('.'), /^(y|yes|true|1|是|✓)/i.test(val));
  } else if (f.enum) {
    const valid = (window[f.enum] || []).map(x => x.id);
    setPath(data, f.path.split('.'), valid.includes(val) ? val : readField(data, f.path));
  } else {
    setPath(data, f.path.split('.'), val);
  }
}

// Build vertical AOA: rows = fields, cols = [Stage, Field+zh, Example, Ex1, Ex2...]
// numExercises = how many blank exercise columns to include
function buildVerticalBatchAOA(numExercises, exerciseDataList) {
  exerciseDataList = exerciseDataList || [];
  const fields = xlsxAllFields();
  const exCols = numExercises || exerciseDataList.length || 1;
  const exNames = exerciseDataList.map((e, i) => (e.meta && e.meta.name) || ('Exercise ' + (i+1)));

  // Header row
  const exHeaders = exerciseDataList.length
    ? exNames
    : Array.from({ length: exCols }, (_, i) => '演習 Exercise ' + (i + 1));
  const header = ['Stage · 階段', 'Field · 欄位', '範例 Example', ...exHeaders];

  // Field rows grouped by stage with a blank separator between stages
  const rows = [header];
  let lastStage = '';
  fields.forEach(f => {
    const stageName = Object.entries(XLSX_SCHEMA).find(([, arr]) => arr.includes(f))?.[0] || '';
    if (stageName !== lastStage) {
      if (lastStage) rows.push(Array(header.length).fill('')); // blank spacer
      lastStage = stageName;
    }
    const exVals = exerciseDataList.length
      ? exerciseDataList.map(e => fieldToCell(e.data, f))
      : Array.from({ length: exCols }, () => '');
    const example = BATCH_EXAMPLE[f.path] || '';
    rows.push([stageName, f.en + ' · ' + f.zh, example, ...exVals]);
  });
  return rows;
}

// Build a CSV string from an array-of-arrays, with proper quoting + BOM for Excel/中文
function toCSV(aoa) {
  const esc = v => {
    const s = (v == null ? '' : String(v));
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return aoa.map(row => row.map(esc).join(',')).join('\r\n');
}
function downloadCSV(aoa, filename) {
  const csv = '\ufeff' + toCSV(aoa); // BOM so Excel reads UTF-8 (Traditional Chinese) correctly
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

}


// ---- IMPORT from .xlsx / .csv ----
function importWorkbookFile(file) {
  if (!ensureSheetJS()) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let wb;
    try { wb = XLSX.read(e.target.result, { type: 'array' }); }
    catch (err) { alert('Could not read the file. Make sure it is a valid .xlsx or .csv. · 無法讀取檔案。'); return; }
    // Decide batch vs single.
    // Vertical batch: first cell is "Stage · 階段" (new format) — fields as rows, exercises as columns.
    // Horizontal batch: first cell starts with "Exercise name" (old format) — exercises as rows.
    // Single-exercise: has per-stage sheet names matching XLSX_SCHEMA keys.
    let batchSheet = wb.SheetNames.includes('Exercises') ? 'Exercises' : null;
    if (!batchSheet) {
      for (const name of wb.SheetNames) {
        const aoa = sheetToAOA(wb, name);
        const first = aoa[0] && String(aoa[0][0] || '').trim();
        if (first && (/^Stage/.test(first) || /^Exercise name/i.test(first))) { batchSheet = name; break; }
      }
    }
    if (batchSheet) {
      importBatch(wb, batchSheet);
    } else {
      importSingleIntoCurrent(wb);
    }
  };
  reader.readAsArrayBuffer(file);
}

function sheetToAOA(wb, name) {
  const ws = wb.Sheets[name];
  if (!ws) return [];
  return XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
}

// Single-exercise workbook (one Value column per stage sheet) → current exercise
function importSingleIntoCurrent(wb) {
  if (!currentExercise()) { alert('Open or create an exercise first, then import into it. · 請先開啟或建立演習再匯入。'); return; }
  if (!confirm('Import will overwrite fields in the current exercise with values from the file. Continue? · 匯入將以檔案內容覆寫目前演習，是否繼續？')) return;

  let applied = 0;
  Object.entries(XLSX_SCHEMA).forEach(([sheetName, fields]) => {
    const aoa = sheetToAOA(wb, sheetName);
    if (!aoa.length) return;
    // map English field label -> value (col 0 = EN label, last col = value)
    const byLabel = {};
    aoa.forEach(row => { if (row && row.length >= 3) byLabel[String(row[0]).trim()] = row[row.length-1]; });
    fields.forEach(f => {
      if (f.en in byLabel) { cellToField(state, f, byLabel[f.en]); applied++; }
    });
  });

  // List sheets
  importListSheets(wb, state);

  saveState();
  render();
  alert(`Imported ${applied} fields plus list sheets into the current exercise. · 已匯入 ${applied} 個欄位及清單。`);
}

function importListSheets(wb, data) {
  const objAOA = sheetToAOA(wb, 'Objectives');
  if (objAOA.length > 1) {
    data.ipm.objectives = objAOA.slice(1).filter(r => r.some(c => String(c).trim())).map(r => ({

// Batch import — handles both vertical (new) and horizontal (old) layouts
function importBatch(wb, sheetName) {
  const aoa = sheetToAOA(wb, sheetName || 'Exercises');
  if (aoa.length < 2) { alert('No data rows found. · 找不到資料列。'); return; }
  const firstCell = String(aoa[0][0] || '').trim();
  if (/^Stage/.test(firstCell)) {
    importBatchVertical(aoa);
  } else {
    importBatchHorizontal(aoa);
  }
}

// ---- Vertical format: rows=fields, cols=exercises (col 3+) ----
function importBatchVertical(aoa) {
  const fields = xlsxAllFields();
  const header = aoa[0]; // [Stage, Field+zh, Example, Ex1, Ex2, ...]
  const exCount = header.length - 3; // columns after Stage, Field, Example
  if (exCount < 1) { alert('No exercise columns found. Add at least one exercise column (column D). · 找不到演習欄位，請至少新增一欄（D 欄）。'); return; }

  // Map each data row to its field by matching the "Field · zh" cell to known fields
  const rowFieldMap = {};
  aoa.forEach((row, rowIdx) => {
    if (rowIdx === 0) return; // header
    const cellText = String(row[1] || '').trim(); // Field column
    const f = fields.find(ff => cellText.startsWith(ff.en) || cellText.includes(ff.en));
    if (f) rowFieldMap[rowIdx] = f;
  });

  // Collect exercise names from header (cols 3+)
  const exNames = header.slice(3).map((n, i) => (String(n||'').trim()) || ('Exercise '+(i+1)));
  const namedExCols = exNames.map((name, colOffset) => ({ name, colIdx: colOffset + 3 }))
    .filter(e => e.name && !e.name.startsWith('演習 Exercise'));

  if (!namedExCols.length) {
    alert('No named exercises found. Fill in the exercise name in the header row (row 1, columns D onward). · 請在標題列（第1列，D欄起）填入演習名稱。');
    return;
  }
  if (!confirm(`Create ${namedExCols.length} exercise(s) from this file? · 從此檔案建立 ${namedExCols.length} 個演習？`)) return;

  let created = 0;
  namedExCols.forEach(({ name, colIdx }) => {
    const data = defaultState();
    aoa.forEach((row, rowIdx) => {
      const f = rowFieldMap[rowIdx];
      if (!f) return;
      const raw = row[colIdx];
      if (raw !== undefined && String(raw).trim() !== '') cellToField(data, f, raw);
    });
    library.exercises.push({ meta: { id: uid(), name, created: Date.now(), updated: Date.now() }, data });
    created++;
  });
  saveState(); render();
  alert(`Created ${created} exercise(s). · 已建立 ${created} 個演習。`);
}

// ---- Horizontal format (legacy): rows=exercises, cols=fields ----
function importBatchHorizontal(aoa) {
  const header = aoa[0].map(h => String(h).trim());
  const fields = xlsxAllFields();
  const colField = {};
  header.forEach((h, idx) => {
    if (idx === 0) return;
    const enPart = h.split(/[/·]/)[0].trim();
    const f = fields.find(ff => ff.en === enPart || h.includes(ff.en));
    if (f) colField[idx] = f;
  });
  const rows = aoa.slice(1).filter(r => String(r[0]||'').trim());
  if (!rows.length) { alert('No named exercises to import. · 沒有具名的演習可匯入。'); return; }
  if (!confirm(`Create ${rows.length} exercise(s)? · 建立 ${rows.length} 個演習？`)) return;
  let created = 0;
  rows.forEach(r => {
    const name = String(r[0]).trim();
    const data = defaultState();
    Object.entries(colField).forEach(([idx, f]) => {
      const raw = r[idx];
      if (raw !== undefined && String(raw).trim() !== '') cellToField(data, f, raw);
    });
    library.exercises.push({ meta: { id: uid(), name, created: Date.now(), updated: Date.now() }, data });
    created++;
  });
  saveState(); render();
  alert(`Created ${created} exercise(s). · 已建立 ${created} 個演習。`);
}

// =====================================================================
// LICENCE VALIDATION  (currently DISABLED — app opens directly)
// The functions below are kept for future use. To re-enable licensing,
// deploy the Cloudflare Worker (see HSEEP_Admin.html), set
// LICENCE_WORKER_URL, and change the bootstrap call at the very bottom
// from renderApp() back to licCheck().
// =====================================================================

const APP_VERSION = '1150521'; // 民國年(115) + 月日(0521) — update on each release

const LICENCE_WORKER_URL = 'YOUR_WORKER_URL'; // e.g. https://hseep-licence.yourname.workers.dev
const LICENCE_GRACE_DAYS  = 7;   // days offline before re-validation required
const TRIAL_DAYS          = 14;  // days of free trial before key required
const LICENCE_KEY         = 'hseep-licence-v1';

// Licence state (kept in memory; persisted to localStorage)
let lic = {
  status:       'checking', // 'checking'|'trial'|'valid'|'locked'
  key:          null,
  org:          null,
  expires:      null,
  validatedAt:  null,       // ms timestamp of last successful remote check
  trialStarted: null,       // ms timestamp when trial began
};

function licLoad() {
  try { const r = localStorage.getItem(LICENCE_KEY); if (r) lic = Object.assign(lic, JSON.parse(r)); } catch {}
}
function licSave() {
  try { localStorage.setItem(LICENCE_KEY, JSON.stringify(lic)); } catch {}
}
function licDaysLeft() {
  if (lic.status === 'trial') {
    const d = TRIAL_DAYS - Math.floor((Date.now() - (lic.trialStarted||Date.now())) / 86400000);
    return Math.max(0, d);
  }
  if (lic.expires) {
    const [y,m] = lic.expires.split('-').map(Number);
    const d = Math.floor((new Date(y, m, 1) - Date.now()) / 86400000);
    return Math.max(0, d);
  }
  return null;
}

async function licValidateRemote(key) {
  const url = LICENCE_WORKER_URL + '/validate?key=' + encodeURIComponent(key);
  const resp = await Promise.race([
    fetch(url),
    new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 6000)),
  ]);
  return resp.json();
}

async function licCheck() {
  licLoad();

  // ---- Has a stored key ----
  if (lic.key) {
    const ageMs   = lic.validatedAt ? Date.now() - lic.validatedAt : Infinity;
    const ageDays = ageMs / 86400000;

    // Cache still fresh → use it
    if (lic.status === 'valid' && ageDays < LICENCE_GRACE_DAYS) {
      return renderApp();
    }

    // Cache stale or first run with this key → call the Worker
    renderLockScreen({ checking: true });
    try {
      const data = await licValidateRemote(lic.key);
      if (data.valid) {
        lic.status = 'valid'; lic.org = data.org;
        lic.expires = data.expires; lic.validatedAt = Date.now();
        licSave(); return renderApp();
      }
      // Worker said invalid
      lic.status = 'locked'; licSave();
      return renderLockScreen({ error: licErrorMsg(data.reason) });
    } catch {
      // Network failure → grace period if previously valid
      if (lic.status === 'valid') { licSave(); return renderApp(); }
      return renderLockScreen({ error: '無法連線至驗證伺服器。請確認網路連線，或稍後再試。\nCannot reach the validation server. Check your connection.' });
    }
  }

  // ---- No key — trial logic ----
  if (!lic.trialStarted) {
    lic.trialStarted = Date.now(); lic.status = 'trial'; licSave();
  }
  const trialDays = (Date.now() - lic.trialStarted) / 86400000;
  if (trialDays < TRIAL_DAYS) {
    lic.status = 'trial'; licSave(); return renderApp();
  }

  // Trial expired
  lic.status = 'locked'; licSave();
  renderLockScreen({ error: '試用期已結束。請輸入授權金鑰以繼續使用。\nTrial period has ended. Enter your licence key to continue.' });
}

function licErrorMsg(reason) {
  const map = {
    'unknown-key':  '此金鑰不存在。請確認金鑰是否正確輸入。\nKey not found.',
    'revoked':      '此金鑰已被停用。請聯絡服務提供者。\nThis key has been revoked.',
    'expired':      '此金鑰已過期。請聯絡服務提供者續約。\nKey has expired.',
    'no-key':       '未提供金鑰。\nNo key provided.',
  };
  return map[reason] || ('驗證失敗：' + reason + '\nValidation failed: ' + reason);
}

async function licActivate(key) {
  key = (key||'').trim().toUpperCase();
  if (!key) { renderLockScreen({ error: '請輸入授權金鑰。\nPlease enter your licence key.' }); return; }
  renderLockScreen({ checking: true });
  try {
    const data = await licValidateRemote(key);
    if (data.valid) {
      lic.key = key; lic.status = 'valid'; lic.org = data.org;
      lic.expires = data.expires; lic.validatedAt = Date.now();
      licSave(); renderApp();
    } else {
      renderLockScreen({ key, error: licErrorMsg(data.reason) });
    }
  } catch {
    renderLockScreen({ key, error: '無法連線至驗證伺服器。請確認網路連線後重試。\nCannot reach the validation server.' });
  }
}

function licStartTrial() {
  if (!lic.trialStarted) { lic.trialStarted = Date.now(); }
  lic.status = 'trial'; licSave(); renderApp();
}

// ---- Lock screen ----
function renderLockScreen({ checking = false, error = null, key = '' } = {}) {
  document.body.className = 'lock-body';
  document.body.innerHTML = `
    <div class="lock-wrap">
      <div class="lock-card">
        <div class="lock-brand">HSEEP Planner</div>
        <div class="lock-brand-zh">演習規劃工作台</div>

        ${checking ? `
          <div class="lock-checking">
            <div class="lock-spinner"></div>
            <div>驗證授權中… Validating licence…</div>
          </div>
        ` : `
          <div class="lock-section">
            <label class="lock-label" for="licKeyInput">授權金鑰 Licence key</label>
            <input id="licKeyInput" class="lock-input" type="text"
              value="${escapeHtml(key)}"
              placeholder="HSEEP-XXXX-YYYYMM-XXXXXX"
              autocomplete="off" autocapitalize="characters" spellcheck="false">
            <button class="lock-btn" id="licActivateBtn">啟用 Activate</button>
          </div>
          ${error ? `<div class="lock-error">${escapeHtml(error)}</div>` : ''}
          ${!lic.trialStarted || lic.status === 'trial' ? `
            <div class="lock-divider">或 or</div>
            <button class="lock-trial-btn" id="licTrialBtn">
              ${lic.trialStarted
                ? `繼續試用（剩餘 ${licDaysLeft()} 天）Continue trial (${licDaysLeft()} days left)`
                : `開始 ${TRIAL_DAYS} 天免費試用 Start ${TRIAL_DAYS}-day free trial`}
            </button>
          ` : ''}
          <div class="lock-footer">如需授權金鑰，請聯絡服務提供者。<br>Contact your service provider for a licence key.<br><br>© 2025 張維達 Wei Ta Chang · All rights reserved</div>
        `}
      </div>
    </div>
  `;
  if (!checking) {
    const btn = document.getElementById('licActivateBtn');
    const inp = document.getElementById('licKeyInput');
    if (btn) btn.addEventListener('click', () => licActivate(inp.value));
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') licActivate(inp.value); });
    const tBtn = document.getElementById('licTrialBtn');
    if (tBtn) tBtn.addEventListener('click', licStartTrial);
  }
}
